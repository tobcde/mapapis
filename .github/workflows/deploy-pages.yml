name: Deploy MaPaPis to GitHub Pages

# Deploy combinado:
#   www.mapapis.com.ar/              <- landing publico (HTML estatico, marketing)
#   www.mapapis.com.ar/mapapis/      <- app vieja (HTML+React UMD, beta)
#   www.mapapis.com.ar/develop/      <- la app Vite (rama develop)
#
# Solo se buildea develop. main Vite (mapapis-next) y pablo (preview)
# fueron removidos del deploy publico por simplicidad.

on:
  push:
    branches: [main, develop]
    paths:
      - 'github-pages/landing/**'
      - 'github-pages/mapapis/**'
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. main: assets staticos (landing + app vieja) ───────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Stage main static artifacts
        run: |
          mkdir -p _site/mapapis _site/develop
          # Landing publico en la raiz
          cp -r github-pages/landing/. _site/
          # App vieja (HTML estatico beta) en /mapapis/
          cp -r github-pages/mapapis/. _site/mapapis/
          # CNAME para custom domain GitHub Pages
          echo "www.mapapis.com.ar" > _site/CNAME

      # ── 2. develop: build Vite → /develop/ ──────────────────────────────
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          path: develop-checkout

      - name: Install web deps (develop)
        working-directory: develop-checkout/web
        run: npm ci --legacy-peer-deps

      - name: Build Vite app (develop)
        working-directory: develop-checkout/web
        env:
          # Valores publicos por diseno (anon key con RLS, MP public key).
          VITE_SUPABASE_URL: https://adpbjslkswtnqklzejuy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcGJqc2xrc3d0bnFrbHplanV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjg5NzIsImV4cCI6MjA5MjY0NDk3Mn0.LrzDO8CtW1FeJjdUH5unjaoAdOtMHnDd9T1E4q7X_uU
          VITE_MP_PUBLIC_KEY: APP_USR-79ac6ee1-8c01-4e30-9ae5-be03cbe403ab
          VITE_MP_CLIENT_ID: '3342777786606412'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: prod
          VITE_BASE_PATH: /develop/
        run: npm run build

      - name: Stage develop artifact
        run: |
          cp -r develop-checkout/web/dist/. _site/develop/

      # ── 3. Deploy combinado ────────────────────────────────────────────
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
