name: Deploy MaPaPis to GitHub Pages

# Deploy combinado:
#   www.mapapis.com.ar/              <- app vieja (HTML estatico, raiz)
#   www.mapapis.com.ar/mapapis-next/ <- app nueva (Vite, rama main)
#   www.mapapis.com.ar/develop/      <- pre-produccion (Vite, rama develop)
#   www.mapapis.com.ar/preview/      <- preview (Vite, rama pablo)
#
# Cada push a main, develop o pablo dispara un rebuild combinado: SIEMPRE
# se buildean las tres ramas (cada una a su subpath). Asi una rama no
# pisa lo de la otra.

on:
  push:
    branches: [main, develop, pablo]
    paths:
      - 'github-pages/mapapis/**'
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. main: app vieja + build Vite → /mapapis-next/ ─────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps (main)
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Typecheck + lint + tests (main)
        working-directory: web
        run: npm run validate

      - name: Build Vite app (main)
        working-directory: web
        env:
          # Valores publicos por diseno (anon key con RLS, MP public key).
          VITE_SUPABASE_URL: https://adpbjslkswtnqklzejuy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcGJqc2xrc3d0bnFrbHplanV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjg5NzIsImV4cCI6MjA5MjY0NDk3Mn0.LrzDO8CtW1FeJjdUH5unjaoAdOtMHnDd9T1E4q7X_uU
          VITE_MP_PUBLIC_KEY: APP_USR-79ac6ee1-8c01-4e30-9ae5-be03cbe403ab
          VITE_MP_CLIENT_ID: '3342777786606412'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: prod
          VITE_BASE_PATH: /mapapis-next/
        run: npm run build

      - name: Stage main artifacts
        run: |
          mkdir -p _site/mapapis-next
          # App vieja en la raiz: index.html, manifest, sw, icons quedan en /
          cp -r github-pages/mapapis/. _site/
          # App nueva (main) en /mapapis-next/
          cp -r web/dist/. _site/mapapis-next/
          # CNAME para custom domain GitHub Pages
          echo "www.mapapis.com.ar" > _site/CNAME

      # ── 2. develop: build Vite → /develop/ (pre-produccion) ─────────────
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          path: develop-checkout

      - name: Install web deps (develop)
        working-directory: develop-checkout/web
        run: npm ci --legacy-peer-deps

      - name: Build Vite app (develop, pre-produccion)
        working-directory: develop-checkout/web
        env:
          VITE_SUPABASE_URL: https://adpbjslkswtnqklzejuy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcGJqc2xrc3d0bnFrbHplanV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjg5NzIsImV4cCI6MjA5MjY0NDk3Mn0.LrzDO8CtW1FeJjdUH5unjaoAdOtMHnDd9T1E4q7X_uU
          VITE_MP_PUBLIC_KEY: APP_USR-79ac6ee1-8c01-4e30-9ae5-be03cbe403ab
          VITE_MP_CLIENT_ID: '3342777786606412'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: prod
          VITE_BASE_PATH: /develop/
        run: npm run build

      - name: Stage develop artifact
        run: |
          mkdir -p _site/develop
          cp -r develop-checkout/web/dist/. _site/develop/

      # ── 3. pablo: build Vite → /preview/ ────────────────────────────────
      - name: Checkout pablo
        uses: actions/checkout@v4
        with:
          ref: pablo
          path: pablo-checkout

      - name: Install web deps (pablo)
        working-directory: pablo-checkout/web
        run: npm ci --legacy-peer-deps

      - name: Build Vite app (pablo, preview)
        working-directory: pablo-checkout/web
        env:
          VITE_SUPABASE_URL: https://adpbjslkswtnqklzejuy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcGJqc2xrc3d0bnFrbHplanV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjg5NzIsImV4cCI6MjA5MjY0NDk3Mn0.LrzDO8CtW1FeJjdUH5unjaoAdOtMHnDd9T1E4q7X_uU
          VITE_MP_PUBLIC_KEY: APP_USR-79ac6ee1-8c01-4e30-9ae5-be03cbe403ab
          VITE_MP_CLIENT_ID: '3342777786606412'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: prod
          VITE_BASE_PATH: /preview/
        run: npm run build

      - name: Stage preview artifact
        run: |
          mkdir -p _site/preview
          cp -r pablo-checkout/web/dist/. _site/preview/

      # ── 4. Deploy combinado ────────────────────────────────────────────
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
