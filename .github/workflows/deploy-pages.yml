name: Deploy MaPaPis to GitHub Pages

# Deploy combinado: app vieja (HTML estatico) + app nueva (Vite build).
# Ambas conviven en el mismo gh-pages:
#   www.mapapis.com.ar/             <- app vieja (raiz, custom domain)
#   www.mapapis.com.ar/mapapis-next/ <- app nueva (Vite)
# Compatibilidad con github.io:
#   tobcde.github.io/mapapis/       <- app vieja
#   tobcde.github.io/mapapis/mapapis-next/ <- app nueva

on:
  push:
    branches: [main]
    paths:
      - 'github-pages/mapapis/**'
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Typecheck + lint + tests
        working-directory: web
        run: npm run validate

      - name: Build Vite app
        working-directory: web
        env:
          # Estos valores son publicos por diseno (anon key con RLS, MP public
          # key). Los hardcodeamos aca en lugar de usar GitHub Secrets — no
          # ganamos nada con eso porque cualquiera los lee en el bundle.
          VITE_SUPABASE_URL: https://adpbjslkswtnqklzejuy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcGJqc2xrc3d0bnFrbHplanV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjg5NzIsImV4cCI6MjA5MjY0NDk3Mn0.LrzDO8CtW1FeJjdUH5unjaoAdOtMHnDd9T1E4q7X_uU
          VITE_MP_PUBLIC_KEY: APP_USR-79ac6ee1-8c01-4e30-9ae5-be03cbe403ab
          VITE_MP_CLIENT_ID: '3342777786606412'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: prod
          VITE_BASE_PATH: /mapapis-next/
        run: npm run build

      - name: Stage combined deploy
        run: |
          mkdir -p _site/mapapis-next
          # App vieja en la raiz: index.html, manifest, sw, icons quedan en /
          cp -r github-pages/mapapis/. _site/
          # App nueva en /mapapis-next/
          cp -r web/dist/. _site/mapapis-next/
          # CNAME para custom domain GitHub Pages
          echo "www.mapapis.com.ar" > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
