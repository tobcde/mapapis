<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" role="img" aria-label="MaPaPis">
  <title>MaPaPis</title>
  <defs>
    <style>
      .wm { font-family: Geist, Inter, -apple-system, system-ui, sans-serif; font-weight: 900; letter-spacing: -0.04em; }
    </style>
  </defs>
  <!-- Highlight sun bajo "ma" (estilo marker, igual que landing) -->
  <rect x="34" y="118" width="146" height="42" fill="#FFC83D"/>
  <!-- Wordmark -->
  <text x="32" y="150" class="wm" font-size="148" fill="#0E1525">mapapis</text>
  <!-- El punto de la "i" como mini map-pin (override del dot tipografico) -->
  <!-- coordenada aproximada del dot del primer "i" en mapap[i]s -->
  <g transform="translate(509 35)">
    <path d="M 14 0 C 6 0 0 6 0 14 C 0 22 5 31 14 39 C 23 31 28 22 28 14 C 28 6 22 0 14 0 Z" fill="#FF5A4E"/>
    <circle cx="14" cy="14" r="5" fill="#FFF7EE"/>
  </g>
</svg>
