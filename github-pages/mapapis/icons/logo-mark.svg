<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MaPaPis">
  <title>MaPaPis</title>

  <!-- Fondo cuadrado redondeado -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#FFF7EE" stroke="#0E1525" stroke-width="14"/>

  <!-- Anillo guia muy sutil (opcional, se ve solo en grande) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0E1525" stroke-width="2" stroke-dasharray="3 6" opacity="0.18"/>

  <!-- =========================================================== -->
  <!-- 6 padres en ronda. Posiciones en un circulo r=175 desde 256,256 -->
  <!-- =========================================================== -->

  <!-- TOP (ang 270) -->
  <g transform="translate(256 88)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#FF5A4E" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <circle cx="-10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <circle cx="10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <path d="M -8 9 Q 0 14 8 9" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- TOP-RIGHT (ang 330) -->
  <g transform="translate(407 169)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#2BC48A" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <!-- pelo / capucha hint -->
    <path d="M -28 -8 Q 0 -38 28 -8" fill="#0E1525"/>
    <circle cx="-10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <circle cx="10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <path d="M -8 9 Q 0 14 8 9" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- BOTTOM-RIGHT (ang 30) -->
  <g transform="translate(407 343)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#6E5BFF" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <!-- moñito / acento -->
    <circle cx="0" cy="-32" r="6" fill="#FFC83D" stroke="#0E1525" stroke-width="3"/>
    <circle cx="-10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <circle cx="10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <path d="M -8 9 Q 0 14 8 9" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- BOTTOM (ang 90) -->
  <g transform="translate(256 424)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#FFC83D" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <!-- lentes -->
    <circle cx="-10" cy="-4" r="7" fill="none" stroke="#FFF7EE" stroke-width="3"/>
    <circle cx="10" cy="-4" r="7" fill="none" stroke="#FFF7EE" stroke-width="3"/>
    <line x1="-3" y1="-4" x2="3" y2="-4" stroke="#FFF7EE" stroke-width="3"/>
    <path d="M -8 10 Q 0 15 8 10" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- BOTTOM-LEFT (ang 150) -->
  <g transform="translate(105 343)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#FF5A4E" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <!-- gorrito -->
    <path d="M -28 -14 L 28 -14 L 22 -32 L -22 -32 Z" fill="#2BC48A" stroke="#0E1525" stroke-width="4"/>
    <circle cx="-10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <circle cx="10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <path d="M -8 9 Q 0 14 8 9" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- TOP-LEFT (ang 210) -->
  <g transform="translate(105 169)">
    <rect x="-36" y="22" width="72" height="56" rx="22" fill="#6E5BFF" stroke="#0E1525" stroke-width="6"/>
    <circle cx="0" cy="-2" r="32" fill="#0E1525"/>
    <!-- pelo largo -->
    <path d="M -32 0 Q -36 30 -22 36 L -22 -2 Z" fill="#0E1525"/>
    <path d="M 32 0 Q 36 30 22 36 L 22 -2 Z" fill="#0E1525"/>
    <circle cx="-10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <circle cx="10" cy="-4" r="3.5" fill="#FFF7EE"/>
    <path d="M -8 9 Q 0 14 8 9" stroke="#FFF7EE" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- =========================================================== -->
  <!-- MOCHILA central -->
  <!-- =========================================================== -->
  <g transform="translate(256 256)">
    <!-- handle / manija -->
    <path d="M -22 -88 Q 0 -110 22 -88" stroke="#0E1525" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- cuerpo principal -->
    <rect x="-72" y="-86" width="144" height="160" rx="26" fill="#FF5A4E" stroke="#0E1525" stroke-width="7"/>

    <!-- correas / tirantes (al frente) -->
    <rect x="-58" y="-80" width="14" height="50" rx="6" fill="#0E1525" opacity="0.85"/>
    <rect x="44" y="-80" width="14" height="50" rx="6" fill="#0E1525" opacity="0.85"/>

    <!-- bolsillo frontal -->
    <rect x="-50" y="-14" width="100" height="68" rx="14" fill="#FFC83D" stroke="#0E1525" stroke-width="6"/>
    <!-- cierre del bolsillo -->
    <line x1="-40" y1="14" x2="40" y2="14" stroke="#0E1525" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="14" r="5" fill="#0E1525"/>

    <!-- detallito alegre: chapita "mp" o un star -->
    <g transform="translate(0 38)">
      <path d="M 0 -8 L 2.5 -2.5 L 8 -2 L 4 2 L 5 8 L 0 5 L -5 8 L -4 2 L -8 -2 L -2.5 -2.5 Z" fill="#0E1525"/>
    </g>
  </g>
</svg>
