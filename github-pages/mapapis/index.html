// Validador CUIT cliente (espejo de validar_cuit en SQL)
function validarCuit(cuit) {
  if (!cuit) return false;
  const clean = String(cuit).replace(/[^0-9]/g, "");
  if (clean.length !== 11) return false;
  const prefix = parseInt(clean.slice(0, 2), 10);
  if (![20,23,24,25,26,27,30,33,34].includes(prefix)) return false;
  const mults = [5,4,3,2,7,6,5,4,3,2];
  let sum = 0;
  for (let i = 0; i < 10; i++) sum += parseInt(clean[i], 10) * mults[i];
  let dv = 11 - (sum % 11);
  if (dv === 11) dv = 0;
  if (dv === 10) return false;
  return dv === parseInt(clean[10], 10);
}

/* ===================== DIALOG (reemplaza alert/confirm nativos) ===================== */
const DialogContext = React.createContext(null);
function useDialog() { return React.useContext(DialogContext); }

function CustomDialog({ dialog, onConfirm, onCancel }) {
  const isConfirm = dialog.type === "confirm";
  return (
    <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center px-4 pb-8 sm:pb-0">
      <div
        className="absolute inset-0 bg-[var(--ink)]/50 backdrop-blur-sm"
        onClick={isConfirm ? onCancel : onConfirm}
      />
      <div
        className="relative w-full max-w-sm bg-[var(--cream)] rounded-3xl border-[1.5px] border-[var(--ink)] p-6 dialog-in"
        style={{ boxShadow: "4px 4px 0 var(--ink)" }}
      >
        <div className={`w-11 h-11 rounded-2xl flex items-center justify-center mb-4 ${isConfirm ? "bg-[var(--sun)]" : "bg-[var(--ink)]"}`}>
          {isConfirm
            ? <IconSparkles className="w-5 h-5 text-[var(--ink)]" />
            : <IconCheck className="w-5 h-5 text-[var(--cream)]" />}
        </div>
        <p className="font-display font-semibold text-[var(--ink)] text-base leading-snug mb-6">
          {dialog.message}
        </p>
        <div className="flex gap-3">
          {isConfirm && (
            <button
              onClick={onCancel}
              className="flex-1 py-3 rounded-xl border-[1.5px] border-[var(--ink)] font-bold text-sm uppercase tracking-wide bg-white text-[var(--ink)]"
            >
              Cancelar
            </button>
          )}
          <button
            onClick={onConfirm}
            className={`flex-1 py-3 rounded-xl border-[1.5px] border-[var(--ink)] font-extrabold text-sm uppercase tracking-wide btn-pop ${
              isConfirm ? "bg-[var(--coral)] text-white" : "bg-[var(--ink)] text-[var(--cream)]"
            }`}
          >
            {isConfirm ? "Confirmar" : "Entendido"}
          </button>
        </div>
      </div>
    </div>
  );
}

function DialogProvider({ children }) {
  const [dialog, setDialog] = useState(null);

  const showAlert = (message) => new Promise(resolve => {
    setDialog({ type: "alert", message, resolve });
  });

  const showConfirm = (message) => new Promise(resolve => {
    setDialog({ type: "confirm", message, resolve });
  });

  const handleConfirm = () => { dialog?.resolve(true); setDialog(null); };
  const handleCancel  = () => { dialog?.resolve(false); setDialog(null); };

  return (
    <DialogContext.Provider value={{ showAlert, showConfirm }}>
      {children}
      {dialog && <CustomDialog dialog={dialog} onConfirm={handleConfirm} onCancel={handleCancel} />}
    </DialogContext.Provider>
  );
}

/* ===================== AUTH GATE ===================== */
function AuthGate() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [joinBanner, setJoinBanner] = useState(null);  // { nombre, zona, code } cuando hay ?join=
  const { showAlert } = useDialog();

  const refetchProfile = async (s) => {
    if (!s) return setProfile(null);
    try {
      const { data, error } = await sb.from("profiles").select("*").eq("id", s.user.id).maybeSingle();
      if (error) {
        console.warn("profile fetch error:", error.message);
        setProfile({ id: s.user.id, email: s.user.email, role: null, _error: error.message });
      } else if (!data) {
        // perfil aun no creado por el trigger — fallback minimal para que no quede en Splash
        setProfile({ id: s.user.id, email: s.user.email, role: null });
      } else {
        setProfile(data);
      }
    } catch (e) {
      console.warn("profile fetch exception:", e?.message || e);
      setProfile({ id: s.user.id, email: s.user.email, role: null, _error: String(e?.message || e) });
    }
  };

  // Capturar ?join=CODE al cargar y guardar para después del login
  useEffect(() => {
    const code = getUrlParam("join");
    if (code) {
      setPendingJoinCode(code);
      // Buscar info del grupo para mostrar banner (acceso anon a la view)
      sb.from("grupos_por_invite").select("nombre, zona, miembros_count, invite_code")
        .eq("invite_code", code.toUpperCase()).maybeSingle()
        .then(({ data }) => { if (data) setJoinBanner(data); });
    }
  }, []);

  // Auto-join cuando ya hay sesión + rol familia/institucion + código pendiente
  useEffect(() => {
    const code = getPendingJoinCode();
    if (!code || !session || !profile?.role) return;
    if (profile.role === "pyme") {
      // pymes no pertenecen a grupos
      setPendingJoinCode("");
      return;
    }
    (async () => {
      const { data, error } = await joinGrupoByCode(code);
      if (error) {
        console.warn("join error:", error.message);
        await showAlert("No pudimos sumarte al grupo: " + error.message);
        setPendingJoinCode("");
        return;
      }
      const result = Array.isArray(data) ? data[0] : data;
      if (result?.grupo_id) {
        setActiveGrupo(result.grupo_id);
        setPendingJoinCode("");
        clearJoinFromUrl();
        if (!result.ya_era_miembro) await showAlert(`Te sumaste a "${result.nombre}" 🎉`);
      }
    })();
  }, [session, profile?.role]);

  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      setSession(data.session);
      await refetchProfile(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange(async (_e, s) => {
      setSession(s);
      await refetchProfile(s);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (loading) return <SplashScreen />;
  if (!session) return <LoginScreen joinBanner={joinBanner} />;
  if (!profile?.role) return <OnboardingRolScreen profile={profile} session={session} onDone={() => refetchProfile(session)} />;
  if (profile.role === "pyme") {
    return <PymeProfileGate profile={profile} session={session} onProfileChange={() => refetchProfile(session)} />;
  }
  return <AppRoot session={session} profile={profile} onProfileChange={() => refetchProfile(session)} />;
}

function PymeProfileGate({ profile, session, onProfileChange }) {
  const [pymeRow, setPymeRow] = useState(undefined); // undefined = loading, null = no existe
  const [loadError, setLoadError] = useState(null);
  const [reloadKey, setReloadKey] = useState(0);

  useEffect(() => {
    let alive = true;
    setLoadError(null);
    (async () => {
      try {
        const { data, error } = await sb.from("pymes").select("*").eq("profile_id", profile.id).maybeSingle();
        if (!alive) return;
        if (error) {
          console.warn("pymes fetch error:", error.message);
          setLoadError(error.message);
          setPymeRow(null);
        } else {
          setPymeRow(data || null);
        }
      } catch (e) {
        if (!alive) return;
        console.warn("pymes fetch exception:", e?.message || e);
        setLoadError(String(e?.message || e));
        setPymeRow(null);
      }
    })();
    return () => { alive = false; };
  }, [profile.id, reloadKey]);

  if (pymeRow === undefined) return <SplashScreen />;
  if (loadError && !pymeRow) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-[var(--cream)] px-6">
        <div className="max-w-sm bg-white border border-red-200 rounded-2xl p-5 text-center shadow-sm">
          <div className="text-red-700 font-bold mb-2">No pudimos cargar tu perfil de pyme</div>
          <div className="text-sm text-[var(--ink)]/70 mb-3">{loadError}</div>
          <div className="text-xs text-[var(--ink)]/60 mb-3">Si recien actualizaste, falta correr la migracion <code>012_pymes_y_adjudicacion.sql</code>.</div>
          <button onClick={() => setReloadKey(k => k + 1)} className="px-4 py-2 rounded-xl bg-[var(--sage)] text-white text-sm font-bold">Reintentar</button>
          <button onClick={async () => { await sb.auth.signOut(); }} className="ml-2 px-4 py-2 rounded-xl border text-sm">Cerrar sesion</button>
        </div>
      </div>
    );
  }
  if (!pymeRow) return <PymeOnboardingScreen profile={profile} onDone={() => setReloadKey(k => k + 1)} />;
  return <AppRoot session={session} profile={profile} pyme={pymeRow} onProfileChange={onProfileChange} />;
}

/* ===================== ONBOARDING — elegir rol ===================== */
function OnboardingRolScreen({ profile, session, onDone }) {
  const [saving, setSaving] = useState(null);
  const [error, setError] = useState(null);

  const elegir = async (role) => {
    setSaving(role); setError(null);
    const { error } = await sb.from("profiles").update({ role }).eq("id", session.user.id);
    setSaving(null);
    if (error) setError(error.message);
    else onDone();
  };

  return (
    <div className="min-h-screen bg-[var(--cream)] bg-dots px-6 py-10 anim-in">
      <div className="max-w-md mx-auto">
        <button
          onClick={async () => { await sb.auth.signOut(); }}
          className="text-xs text-[var(--ink)]/60 hover:text-[var(--coral)] font-semibold mb-8 flex items-center gap-1"
        >
          <IconLogout className="w-3.5 h-3.5" /> Salir
        </button>
        <div className="text-xs font-bold uppercase tracking-[0.2em] text-[var(--coral)]">Bienvenido</div>
        <h1 className="font-display font-black text-5xl leading-none mt-3">
          ¿Quién <span className="font-display-italic">sos</span>?
        </h1>
        <p className="text-[var(--ink)]/70 mt-3 text-[15px]">
          Esto define qué pantallas vas a ver. Lo podés cambiar después.
        </p>
        <div className="mt-8 space-y-3">
          {Object.entries(ROLES_INFO).map(([key, info]) => {
            const IconCmp = info.icon;
            const isSaving = saving === key;
            return (
              <button
                key={key}
                disabled={!!saving}
                onClick={() => elegir(key)}
                className="card-hover w-full text-left bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 flex items-center gap-4 disabled:opacity-50"
                style={{boxShadow: "4px 4px 0 var(--ink)"}}
              >
                <div className="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0" style={{background: info.color}}>
                  <IconCmp className="w-7 h-7 text-white" />
                </div>
                <div className="flex-1">
                  <div className="font-display font-bold text-xl">{info.label}</div>
                  <div className="text-sm text-[var(--ink)]/60">{info.short}</div>
                </div>
                {isSaving ? <span className="text-xs">…</span> : <IconArrowRight className="w-5 h-5" />}
              </button>
            );
          })}
        </div>
        {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-3 text-center font-semibold mt-4">{error}</p>}
      </div>
    </div>
  );
}

/* ===================== APP ROOT — bottom nav + screens ===================== */
function AppRoot({ session, profile, onProfileChange }) {
  const [screen, setScreen] = useState("feed");
  const [selected, setSelected] = useState(null);
  const [activeGrupoId, setActiveGrupoIdState] = useState(getActiveGrupo() || null);

  const isPyme = profile.role === "pyme";

  // Primer login sin grupo y sin estar pendiente de un join → mandar al tab Grupo
  useEffect(() => {
    if (isPyme) return;
    (async () => {
      const { count } = await sb.from("grupo_miembros")
        .select("*", { count: "exact", head: true })
        .eq("profile_id", profile.id);
      if ((count || 0) === 0) setScreen("grupo");
    })();
    // eslint-disable-next-line
  }, []);

  const goDetalle = (n) => { setSelected(n); setScreen("detalle"); };
  const goBack = () => { setSelected(null); setScreen("feed"); };
  const onChangeGrupo = (id) => { setActiveGrupo(id || ""); setActiveGrupoIdState(id || null); };
  const goToScreen = (s) => {
    if (s === "grupo") {
      const stored = getActiveGrupo();
      if (stored && stored !== activeGrupoId) setActiveGrupoIdState(stored);
    }
    setScreen(s);
  };

  return (
    <div className="min-h-screen flex justify-center" data-role={profile.role}>
      <div className="w-full max-w-md flex flex-col min-h-screen relative pb-24">
        <div className="role-stripe"></div>
        <RoleBadge profile={profile} onClick={() => setScreen("perfil")} />
        {screen === "feed" && (isPyme
          ? <FeedPymeScreen profile={profile} onOpen={goDetalle} />
          : <FeedFamiliaScreen profile={profile} onOpen={goDetalle} />)}
        {screen === "mis-ofertas" && isPyme && <MisOfertasScreen profile={profile} onOpen={goDetalle} />}
        {screen === "publicar" && <PublicarScreen profile={profile} grupoId={activeGrupoId} onChangeGrupo={onChangeGrupo} onCancel={goBack} onPublicado={goBack} />}
        {screen === "grupo" && <GrupoScreen profile={profile} grupoId={activeGrupoId} onChangeGrupo={onChangeGrupo} onBack={() => setScreen("feed")} />}
        {screen === "detalle" && <DetalleScreen necesidad={selected} profile={profile} onBack={goBack} />}
        {screen === "perfil" && <PerfilScreen profile={profile} onProfileChange={onProfileChange} />}

        <BottomNav screen={screen} setScreen={goToScreen} isPyme={isPyme} />
      </div>
    </div>
  );
}

/* ===================== FEED — Familia / Institución ===================== */
function FeedFamiliaScreen({ profile, onOpen }) {
  const [necesidades, setNecesidades] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let alive = true;
    setLoading(true);
    (async () => {
      try {
        const { data, error } = await sb
          .from("necesidades")
          .select("*, categorias(nombre, slug), grupos(nombre, rango_familias, alumnos(count)), necesidad_inscripciones(count)")
          .order("created_at", { ascending: false });
        if (!alive) return;
        if (error) console.error("[FeedFamilia] fetch error:", error);
        setNecesidades(!error && data ? data.map(normalizeNecesidad) : []);
      } catch (e) {
        console.error("[FeedFamilia] exception:", e);
      } finally {
        if (alive) setLoading(false);
      }
    })();
    return () => { alive = false; };
  }, [profile.id]);

  const activas = necesidades.filter(n => !["completada", "cumplida", "cancelada"].includes(n.estado)).length;
  const enVotacion = necesidades.filter(n => n.estado === "en_votacion").length;
  const totalOfertas = necesidades.reduce((a, n) => a + (n.ofertas || 0), 0);

  return (
    <div className="px-5 pt-8 anim-in">
      {/* Header */}
      <div className="flex items-start justify-between mb-6">
        <div>
          <p className="text-xs uppercase font-bold tracking-[0.2em] text-[var(--coral)]">Hola, {profile.nombre || profile.email.split("@")[0]}</p>
          <h1 className="font-display font-black text-[44px] leading-[0.95] mt-2">
            Necesidades <span className="font-display-italic">activas</span>
          </h1>
        </div>
      </div>

      {/* Bento stats */}
      <div className="grid grid-cols-3 gap-2 mb-6">
        <StatChip num={activas} label="activas" color="var(--coral)" />
        <StatChip num={enVotacion} label="votando" color="var(--violet)" />
        <StatChip num={totalOfertas} label="ofertas" color="var(--sage)" />
      </div>

      <div className="squiggle mb-5"></div>

      {/* Lista */}
      <div className="space-y-3">
        {loading ? (
          <div className="text-center text-sm text-[var(--ink)]/60 py-8">Cargando…</div>
        ) : necesidades.length === 0 ? (
          <div className="bg-white rounded-2xl border-[1.5px] border-dashed border-[var(--ink)]/30 p-8 text-center">
            <p className="text-sm text-[var(--ink)]/70">Todavía no hay necesidades.</p>
            <p className="text-xs text-[var(--ink)]/50 mt-1">Tocá <span className="font-bold">+</span> abajo para publicar la primera.</p>
          </div>
        ) : (
          necesidades.map(n => <NecesidadCard key={n.id} n={n} onClick={() => onOpen(n)} mode="familia" />)
        )}
      </div>
    </div>
  );
}

function StatChip({ num, label, color }) {
  return (
    <div className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-3 flex flex-col items-start" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
      <span className="font-display font-black text-3xl leading-none" style={{color}}>{num}</span>
      <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70 mt-1">{label}</span>

}

/* ===================== MIS OFERTAS — Pyme ===================== */
function MisOfertasScreen({ profile, onOpen }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("activas");

  useEffect(() => {
    let alive = true;
    setLoading(true);
    (async () => {
      const { data, error } = await sb
        .from("ofertas")
        .select("id, estado, precio_total_centavos, tiempo_entrega_dias, descripcion, created_at, necesidad:necesidades(id, titulo, zona, estado, modalidad, fecha_limite, ofertas_count, creador_tipo, foto_url, categorias(nombre))")
        .eq("pyme_id", profile.id)
        .order("created_at", { ascending: false });
      if (!alive) return;
      if (error) { console.error("[MisOfertas] fetch:", error); setItems([]); }
      else setItems(data || []);
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [profile.id]);

  const clasificar = (o) => {
    const ne = o.necesidad?.estado;
    if (o.estado === "ganadora") {
      if (ne === "cumplida") return "ganadas";
      return "ganadas";
    }
    if (o.estado === "retirada") return "perdidas";
    if (o.estado === "descartada") return "perdidas";
    if (ne === "cancelada") return "perdidas";
    if (ne === "adjudicada" || ne === "en_curso" || ne === "cumplida") return "perdidas";
    return "activas";
  };

  const grupos = { activas: [], ganadas: [], perdidas: [] };
  items.forEach(o => grupos[clasificar(o)].push(o));

  const TABS = [
    { key: "activas", label: "Activas", color: "var(--sun)" },
    { key: "ganadas", label: "Ganadas", color: "var(--sage)" },
    { key: "perdidas", label: "Perdidas", color: "var(--ink)" },
  ];

  const visibles = grupos[tab];

  return (
    <div className="px-5 pt-8 anim-in">
      <div className="flex items-start justify-between mb-6">
        <div>
          <p className="text-xs uppercase font-bold tracking-[0.2em] text-[var(--sage)]">Hola, {profile.nombre || profile.email.split("@")[0]}</p>
          <h1 className="font-display font-black text-[44px] leading-[0.95] mt-2">
            Mis <span className="font-display-italic">ofertas</span>
          </h1>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-5">
        {TABS.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={`bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-3 flex flex-col items-start ${tab === t.key ? 'ring-2 ring-[var(--ink)]' : ''}`}
            style={{boxShadow: "3px 3px 0 var(--ink)"}}>
            <span className="font-display font-black text-3xl leading-none" style={{color: t.color}}>{grupos[t.key].length}</span>
            <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70 mt-1">{t.label}</span>
          </button>
        ))}
      </div>

      <div className="squiggle mb-5"></div>

      <div className="space-y-3">
        {loading ? (
          <div className="text-center text-sm text-[var(--ink)]/60 py-8">Cargando…</div>
        ) : visibles.length === 0 ? (
          <div className="bg-white rounded-2xl border-[1.5px] border-dashed border-[var(--ink)]/30 p-8 text-center">
            <p className="text-sm text-[var(--ink)]/70">
              {tab === "activas" && "No tenés ofertas activas. Mirá el feed para presentar."}
              {tab === "ganadas" && "Todavía no ganaste ninguna. ¡Suerte con las activas!"}
              {tab === "perdidas" && "Sin ofertas perdidas. ✨"}
            </p>
          </div>
        ) : (
          visibles.map(o => <MiOfertaCard key={o.id} oferta={o} onClick={() => o.necesidad && onOpen(normalizeNecesidad(o.necesidad))} />)
        )}
      </div>
    </div>
  );
}

function MiOfertaCard({ oferta, onClick }) {
  const n = oferta.necesidad;
  if (!n) return null;
  const est = ESTADO_LABEL[n.estado] || { txt: n.estado, bg: "bg-slate-200", fg: "text-[var(--ink)]" };
  const ganada = oferta.estado === "ganadora";
  const perdida = oferta.estado === "descartada" || (n.estado === "adjudicada" && oferta.estado === "presentada") || (n.estado === "cancelada");
  const accent = ganada ? "var(--sage)" : perdida ? "var(--ink)" : "var(--sun)";
  const tag = ganada ? "🏆 Ganaste" : perdida ? "Pasaron" : "Esperando";
  return (
    <button onClick={onClick} className="card-hover block w-full text-left bg-white rounded-3xl border-[1.5px] border-[var(--ink)] overflow-hidden" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
      <div className={`px-4 py-1.5 ${est.bg} ${est.fg} text-[10px] font-bold uppercase tracking-wider flex items-center justify-between`}>
        <span>{est.txt}</span>
        <span style={{color: accent === "var(--sun)" ? "var(--ink)" : undefined}}>{tag}</span>
      </div>
      <div className="p-4">
        <p className="text-[10px] uppercase tracking-wider font-bold text-[var(--ink)]/50">{n.categorias?.nombre || "—"} · {n.zona}</p>
        <h3 className="font-display font-bold text-lg mt-1 leading-tight">{n.titulo}</h3>
        <div className="mt-3 flex items-baseline justify-between gap-3">
          <span className="font-mono font-extrabold text-xl">{fmt(Number(oferta.precio_total_centavos))}</span>
          {oferta.tiempo_entrega_dias && (
            <span className="text-[10px] uppercase tracking-wider font-bold text-[var(--ink)]/60">{oferta.tiempo_entrega_dias} días</span>
          )}
        </div>
        <p className="text-xs text-[var(--ink)]/70 mt-2 line-clamp-2">{oferta.descripcion}</p>
      </div>
    </button>
  );
}
