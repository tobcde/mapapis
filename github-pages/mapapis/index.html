          <p className="text-xs text-slate-500 mb-1">Tu parte</p>
          <div className="flex items-center justify-between mb-3">
            <span className="text-2xl font-extrabold text-slate-900">${n.cuota}</span>
            <span className="text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-1 rounded-full">PENDIENTE</span>
          </div>
          <div className="bg-slate-50 rounded-xl p-3 mb-3 flex items-center justify-between">
            <div>
              <p className="text-[10px] text-slate-500 font-bold uppercase">Alias MP</p>
              <p className="font-mono font-bold text-sm text-slate-900">garcia.jardin.mp</p>
            </div>
            <button className="w-8 h-8 bg-sky-100 rounded-lg flex items-center justify-center text-sky-600 active:scale-95">
              <IconCopy className="w-4 h-4" />
            </button>
          </div>
          <button className="w-full bg-sky-600 text-white font-extrabold py-3 rounded-xl active:scale-[0.98] transition-transform">
            Ya transferí ✓
          </button>
        </div>

        <div>
          <h3 className="font-extrabold text-slate-900 mb-3 flex items-center gap-2">
            <IconFileText className="w-4 h-4" /> Presupuestos (3)
          </h3>
          <div className="space-y-2">
            <PresupuestoRow lugar="Mayorista Once" monto="$10.800" ganador />
            <PresupuestoRow lugar="Jumbo" monto="$12.500" />
            <PresupuestoRow lugar="Coto" monto="$13.200" />
          </div>
          <button className="w-full mt-3 text-sky-600 font-bold text-sm py-2 border border-sky-200 rounded-xl active:scale-[0.98]">
            + Agregar otro presupuesto
          </button>
        </div>

        <div>
          <h3 className="font-extrabold text-slate-900 mb-3">Estado de transferencias</h3>
          <div className="bg-white rounded-2xl border border-slate-200 divide-y divide-slate-100 overflow-hidden">
            {familias.map((f) => <FamiliaRow key={f.nombre} {...f} />)}
            <button className="w-full py-3 text-xs font-bold text-slate-500 flex items-center justify-center gap-1">
              Ver las 25 familias <IconChevronRight className="w-3 h-3" />
            </button>
          </div>
        </div>

        <button className="w-full bg-slate-900 text-white font-extrabold py-4 rounded-2xl active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
          <IconCamera className="w-4 h-4" /> Cerrar (subir ticket)
        </button>
      </div>
    </div>
  );
}
function PresupuestoRow({ lugar, monto, ganador }) {
  return (
    <div className={`rounded-xl p-3 border flex items-center justify-between ${ganador ? "border-emerald-400 bg-emerald-50" : "border-slate-200 bg-white"}`}>
      <div className="flex items-center gap-3">
        <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${ganador ? "bg-emerald-500" : "bg-slate-100"}`}>
          {ganador ? <IconCheckCircle className="w-5 h-5 text-white" /> : <IconFileText className="w-4 h-4 text-slate-400" />}
        </div>
        <div>
          <p className="font-bold text-slate-900 text-sm">{lugar}</p>
          {ganador && <p className="text-[10px] text-emerald-700 font-extrabold">ELEGIDO</p>}
        </div>
      </div>
      <span className={`font-extrabold ${ganador ? "text-emerald-700" : "text-slate-600"}`}>{monto}</span>
    </div>
  );
}
function FamiliaRow({ nombre, estado, monto }) {
  const config = {
    pago: { icon: "✅", text: "Confirmado", color: "text-emerald-600" },
    marcado: { icon: "⏳", text: "Marcó como pagado", color: "text-amber-600" },
    pendiente: { icon: "○", text: "Pendiente", color: "text-slate-400" },
  };
  const c = config[estado];
  return (
    <div className="px-4 py-3 flex items-center justify-between">
      <div>
        <p className="font-semibold text-slate-900 text-sm">{nombre}</p>
        <p className={`text-xs ${c.color} font-semibold`}>{c.icon} {c.text}</p>
      </div>
      <span className="text-sm font-extrabold text-slate-700">${monto}</span>
    </div>
  );
}

/* ===================== ROTACIÓN ===================== */
function RotacionScreen({ rotacion }) {
  const max = Math.max(...rotacion.map(r => r.veces));
  return (
    <div>
      <div className="bg-gradient-to-br from-violet-500 to-fuchsia-500 px-6 pt-6 pb-8">
        <h1 className="text-white text-2xl font-extrabold tracking-tight">Rotación</h1>
        <p className="text-violet-100 text-sm mt-1">Quién se encargó este año</p>
        <div className="mt-4 bg-white/15 backdrop-blur rounded-2xl p-3 flex items-center gap-3">
          <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
            <IconTrendingUp className="w-5 h-5 text-white" />
          </div>
          <div>
            <p className="text-white font-extrabold text-sm">Promedio del grupo: 1.1</p>
            <p className="text-violet-100 text-xs">3 familias nunca se encargaron</p>
          </div>
        </div>
      </div>
      <div className="p-5">
        <div className="flex items-center gap-3 mb-4 text-xs flex-wrap">
          <LegendDot color="bg-rose-400" label="Mucho" />
          <LegendDot color="bg-amber-400" label="Normal" />
          <LegendDot color="bg-emerald-400" label="Poco" />
          <LegendDot color="bg-sky-400" label="Ninguna" />
        </div>
        <div className="space-y-2">
          {rotacion.map((r, i) => <RotacionRow key={i} {...r} max={max} rank={i + 1} />)}
        </div>
        <div className="mt-6 bg-slate-50 rounded-2xl p-4 text-center">
          <p className="text-xs text-slate-500">Rotación del año completa disponible en el panel de delegados</p>
        </div>
      </div>
    </div>
  );
}
function LegendDot({ color, label }) {
  return (
    <div className="flex items-center gap-1.5">
      <span className={`w-2 h-2 rounded-full ${color}`}></span>
      <span className="text-slate-500 font-semibold">{label}</span>
    </div>
  );
}
function RotacionRow({ familia, veces, ultima, tarea, color, max, rank }) {
  const pct = max > 0 ? (veces / max) * 100 : 0;
  const barColor = veces >= 3 ? "bg-rose-400" : veces >= 2 ? "bg-amber-400" : veces >= 1 ? "bg-emerald-400" : "bg-sky-300";
  return (
    <div className="bg-white rounded-2xl p-3.5 border border-slate-200">
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <span className="text-xs font-extrabold text-slate-400 w-5">#{rank}</span>
          <span className="font-bold text-slate-900 text-sm">{familia}</span>
        </div>
        <span className={`text-[10px] font-extrabold px-2 py-0.5 rounded-full ${color}`}>
          {veces} {veces === 1 ? "vez" : "veces"}
        </span>
      </div>
      <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden mb-2">
        <div className={`h-full rounded-full ${barColor}`} style={{ width: `${pct}%` }} />
      </div>
      <p className="text-[11px] text-slate-500">
        {veces > 0 ? <>Última: <span className="font-semibold text-slate-700">{ultima} · {tarea}</span></> : <span className="italic">Nunca se encargó 👀</span>}
      </p>
    </div>
  );
}

/* ===================== AUTH GATE ===================== */
function AuthGate() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-100">
        <div className="text-slate-500 text-sm">Cargando…</div>
      </div>
    );
  }
  if (!session) return <LoginScreen />;
  return <AppShell session={session} />;
}

function LoginScreen() {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const onSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    setError(null);
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname }
    });
    setSubmitting(false);
    if (error) setError(error.message);
    else setSent(true);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-sky-50 to-slate-100">
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8">
        <div className="text-center mb-6">
          <div className="text-5xl mb-3">👨‍👩‍👧</div>
          <h1 className="text-2xl font-extrabold text-slate-900">MaPaPis</h1>
          <p className="text-sm text-slate-500 mt-1">Coordiná el grupo de padres</p>
        </div>
        {sent ? (
          <div className="text-center py-3">
            <div className="text-4xl mb-3">📬</div>
            <p className="text-sm text-slate-700 font-bold">Te mandamos un link a</p>
            <p className="text-sm text-sky-600 font-mono mt-1 break-all">{email}</p>
            <p className="text-xs text-slate-500 mt-4">Revisá tu casilla (también spam) y hacé click para entrar.</p>
            <button
              onClick={() => { setSent(false); setEmail(""); }}
              className="text-xs text-slate-400 underline mt-4"
            >Usar otro email</button>
          </div>
        ) : (
          <form onSubmit={onSubmit} className="space-y-3">
            <input
              type="email" required value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="tu@email.com"
              className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-sky-500 focus:outline-none text-sm"
            />
            <button
              type="submit" disabled={submitting || !email}
              className="w-full py-3 bg-gradient-to-r from-sky-500 to-sky-600 text-white font-bold rounded-xl shadow-lg shadow-sky-500/30 active:scale-[0.98] transition-transform disabled:opacity-50"
            >
              {submitting ? "Enviando…" : "Recibir link mágico"}
            </button>
            {error && <p className="text-xs text-rose-600 text-center">{error}</p>}
          </form>
        )}
        <p className="text-[10px] text-slate-400 text-center mt-6">Prototipo v0.1 · MaPaPis</p>
      </div>
    </div>
  );
}

function AppShell({ session }) {
  const logout = async () => { await sb.auth.signOut(); };
  return (
    <>
      <div className="fixed top-2 left-2 z-50 bg-white/90 backdrop-blur border border-slate-200 rounded-full px-3 py-1.5 shadow flex items-center gap-2 text-xs">
        <span className="text-slate-700 font-semibold truncate max-w-[160px]">👤 {session.user.email}</span>
        <button onClick={logout} className="text-rose-600 font-bold hover:text-rose-700">Salir</button>
      </div>
      <App />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
</body>
</html>
