/* ===================== AUTH GATE ===================== */
function AuthGate() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  const refetchProfile = async (s) => {
    if (!s) return setProfile(null);
    const { data, error } = await sb.from("profiles").select("*").eq("id", s.user.id).single();
    if (error) {
      console.warn("profile fetch error:", error.message);
      setProfile({ id: s.user.id, email: s.user.email, role: null, _error: error.message });
    } else {
      setProfile(data);
    }
  };

  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      setSession(data.session);
      await refetchProfile(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange(async (_e, s) => {
      setSession(s);
      await refetchProfile(s);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (loading) return <SplashScreen />;
  if (!session) return <LoginScreen />;
  if (!profile?.role) return <OnboardingRolScreen profile={profile} session={session} onDone={() => refetchProfile(session)} />;
  return <AppRoot session={session} profile={profile} onProfileChange={() => refetchProfile(session)} />;
}

  );
}

                disabled={!!saving}
                onClick={() => elegir(key)}
                className="card-hover w-full text-left bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 flex items-center gap-4 disabled:opacity-50"
                style={{boxShadow: "4px 4px 0 var(--ink)"}}
              >
                <div className="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0" style={{background: info.color}}>
                  <IconCmp className="w-7 h-7 text-white" />
                </div>
                <div className="flex-1">
                  <div className="font-display font-bold text-xl">{info.label}</div>
                  <div className="text-sm text-[var(--ink)]/60">{info.short}</div>
                </div>
                {isSaving ? <span className="text-xs">…</span> : <IconArrowRight className="w-5 h-5" />}
              </button>
            );
          })}
        </div>
        {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-3 text-center font-semibold mt-4">{error}</p>}
      </div>
    </div>
  );
}

/* ===================== APP ROOT — bottom nav + screens ===================== */
function AppRoot({ session, profile, onProfileChange }) {
  const [screen, setScreen] = useState("feed");
  const [selected, setSelected] = useState(null);

  const goDetalle = (n) => { setSelected(n); setScreen("detalle"); };
  const goBack = () => { setSelected(null); setScreen("feed"); };

  const isPyme = profile.role === "pyme";

  return (
    <div className="min-h-screen bg-[var(--cream)] flex justify-center">
      <div className="w-full max-w-md flex flex-col min-h-screen relative pb-24">
        {screen === "feed" && (isPyme
          ? <FeedPymeScreen profile={profile} onOpen={goDetalle} />
          : <FeedFamiliaScreen profile={profile} onOpen={goDetalle} />)}
        {screen === "publicar" && <PublicarScreen profile={profile} onCancel={goBack} onPublicado={goBack} />}
        {screen === "detalle" && <DetalleScreen necesidad={selected} profile={profile} onBack={goBack} />}
        {screen === "perfil" && <PerfilScreen profile={profile} onProfileChange={onProfileChange} />}

        <BottomNav screen={screen} setScreen={setScreen} isPyme={isPyme} />
      </div>
    </div>
  );
}

function BottomNav({ screen, setScreen, isPyme }) {
  return (
    <div className="fixed bottom-0 left-0 right-0 z-30 flex justify-center pointer-events-none">
      <div className="w-full max-w-md px-4 pb-3 pointer-events-auto">

          <NavBtn IconCmp={IconHome} label="Feed" active={screen === "feed"} onClick={() => setScreen("feed")} />
          {!isPyme && (
            <button
              onClick={() => setScreen("publicar")}
              className="-mt-7 w-14 h-14 bg-[var(--coral)] rounded-2xl flex items-center justify-center border-[1.5px] border-[var(--ink)]"
              style={{boxShadow: "3px 3px 0 var(--ink)"}}
            >
              <IconPlus className="w-7 h-7 text-white" stroke={2.5} />

}

function NavBtn({ IconCmp, label, active, onClick }) {

/* ===================== FEED — Familia / Institución ===================== */

/* ===================== Publicar necesidad ===================== */
function PublicarScreen({ profile, onCancel, onPublicado }) {
  const [titulo, setTitulo] = useState("");
  const [categoria, setCategoria] = useState(CATEGORIAS[0]);
  const [zona, setZona] = useState(ZONAS[0]);
  const [presupuestoMin, setPresupuestoMin] = useState("");
  const [presupuestoMax, setPresupuestoMax] = useState("");
  const [descripcion, setDescripcion] = useState("");
  const [enviando, setEnviando] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setEnviando(true);
    // TODO Slice 3: insertar en Supabase
    await new Promise(r => setTimeout(r, 700));
    setEnviando(false);
    alert("Mock: necesidad publicada. (En el próximo slice se guarda en la DB.)");
    onPublicado();
  };

  return (
    <div className="px-5 pt-6 pb-12 anim-in">
      <button onClick={onCancel} className="flex items-center gap-1 text-sm font-semibold text-[var(--ink)]/70 mb-4">
        <IconArrowLeft className="w-4 h-4" /> Cancelar

      <h1 className="font-display font-black text-4xl leading-none">
        Publicar <span className="font-display-italic">necesidad</span>
      </h1>
      <p className="text-sm text-[var(--ink)]/60 mt-2">Las pymes verán esto anonimizado por zona.</p>
      <div className="squiggle my-5"></div>

      <form onSubmit={submit} className="space-y-4">
        <Field label="Título">
          <input value={titulo} onChange={(e) => setTitulo(e.target.value)} required placeholder="ej: 25 mapas políticos plastificados"
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
        </Field>

        <Field label="Categoría">
          <select value={categoria} onChange={(e) => setCategoria(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium">
            {CATEGORIAS.map(c => <option key={c}>{c}</option>)}
          </select>
        </Field>

        <Field label="Zona">
          <select value={zona} onChange={(e) => setZona(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium">
            {ZONAS.map(z => <option key={z}>{z}</option>)}
          </select>
        </Field>

        <div className="grid grid-cols-2 gap-3">
          <Field label="Presupuesto mín">
            <input type="number" value={presupuestoMin} onChange={(e) => setPresupuestoMin(e.target.value)} placeholder="30000"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
          </Field>
          <Field label="Presupuesto máx">
            <input type="number" value={presupuestoMax} onChange={(e) => setPresupuestoMax(e.target.value)} placeholder="50000"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
          </Field>
        </div>

        <Field label="Descripción">
          <textarea value={descripcion} onChange={(e) => setDescripcion(e.target.value)} required rows={4}
            placeholder="Detalle del pedido. Sin nombres del jardín/colegio ni datos de contacto."
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none resize-none" />
        </Field>

        <div className="bg-[var(--mist)] rounded-2xl p-3 text-xs text-[var(--ink)]/75">
          <span className="font-bold">⚠️ Privacidad:</span> no incluyas teléfonos, emails ni nombre de la institución. Filtramos esto automáticamente.
        </div>

        <button type="submit" disabled={enviando}
          className="btn-pop w-full py-3.5 bg-[var(--coral)] text-white font-extrabold rounded-xl border-[1.5px] border-[var(--ink)] uppercase tracking-wider text-sm disabled:opacity-50">
          {enviando ? "Publicando…" : "Publicar →"}
        </button>
      </form>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-1.5">{label}</span>
      {children}
    </label>
  );
}

/* ===================== Perfil ===================== */
function PerfilScreen({ profile, onProfileChange }) {
  const [editing, setEditing] = useState(false);
  const [nombre, setNombre] = useState(profile.nombre || "");
  const [saving, setSaving] = useState(false);

  const guardarNombre = async () => {
    setSaving(true);
    await sb.from("profiles").update({ nombre }).eq("id", profile.id);
    setSaving(false);
    setEditing(false);
    onProfileChange();
  };

  const cambiarRol = async () => {
    if (!confirm("¿Cambiar de rol? Vas a volver al onboarding.")) return;
    await sb.from("profiles").update({ role: null }).eq("id", profile.id);
    onProfileChange();
  };

  const logout = async () => { await sb.auth.signOut(); };

  const info = ROLES_INFO[profile.role];
  const IconCmp = info?.icon || IconUser;
  const initial = (profile.nombre || profile.email)[0]?.toUpperCase();

  return (
    <div className="px-5 pt-8 anim-in">
      <h1 className="font-display font-black text-4xl leading-none">Tu <span className="font-display-italic">perfil</span></h1>
      <div className="squiggle my-5"></div>

      {/* Header tarjeta */}
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-4" style={{boxShadow: "4px 4px 0 var(--ink)"}}>
        <div className="flex items-center gap-4">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center font-display font-black text-3xl text-white" style={{background: info?.color || "var(--coral)"}}>
            {initial}
          </div>
          <div className="flex-1 min-w-0">
            {editing ? (
              <div className="flex gap-2">
                <input value={nombre} onChange={(e) => setNombre(e.target.value)}
                  className="flex-1 px-3 py-2 rounded-lg border-[1.5px] border-[var(--ink)] text-sm font-semibold" />
                <button onClick={guardarNombre} disabled={saving} className="btn-pop bg-[var(--sage)] text-white px-3 py-2 rounded-lg border-[1.5px] border-[var(--ink)] text-xs font-bold uppercase">
                  {saving ? "…" : "OK"}
                </button>
              </div>
            ) : (
              <>
                <div className="font-display font-bold text-xl truncate">{profile.nombre || profile.email.split("@")[0]}</div>
                <div className="text-xs text-[var(--ink)]/60 truncate">{profile.email}</div>
                <button onClick={() => setEditing(true)} className="text-[10px] font-bold uppercase tracking-wider text-[var(--coral)] mt-1">Editar nombre</button>
              </>
            )}
          </div>
        </div>
      </div>

      {/* Rol */}
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-4" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
        <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Rol</div>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background: info?.color}}>
              <IconCmp className="w-5 h-5 text-white" />
            </div>
            <div>
              <div className="font-display font-bold text-lg">{info?.label}</div>
              <div className="text-xs text-[var(--ink)]/60">{info?.short}</div>
            </div>
          </div>
        </div>
        <button onClick={cambiarRol} className="mt-4 text-xs font-bold uppercase tracking-wider text-[var(--coral)]">Cambiar de rol →</button>
      </div>

      {/* Logout */}
      <button onClick={logout} className="btn-pop w-full py-3.5 bg-white text-[var(--ink)] font-extrabold rounded-xl border-[1.5px] border-[var(--ink)] uppercase tracking-wider text-sm flex items-center justify-center gap-2">
        <IconLogout className="w-4 h-4" /> Cerrar sesión
      </button>

      <div className="text-center text-[10px] text-[var(--ink)]/40 mt-8 uppercase tracking-widest">
        MaPaPis · Prototipo v0.2
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
</body>
</html>
