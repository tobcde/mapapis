/* ===================== Detalle de necesidad ===================== */
function DetalleScreen({ necesidad: necProp, profile, onBack }) {
  if (!necProp) return <div className="p-6">Sin necesidad seleccionada.</div>;
  const [n, setN] = useState(necProp);
  const est = ESTADO_LABEL[n.estado];
  const isPyme = profile.role === "pyme";
  const [ofertas, setOfertas] = useState([]);
  const [misAlumnos, setMisAlumnos] = useState([]);
  const [misVotos, setMisVotos] = useState({}); // { alumnoId: ofertaId }
  const [inscripciones, setInscripciones] = useState([]); // { alumno_id, inscripto_por }
  const [miRol, setMiRol] = useState(null);
  const [totalAlumnos, setTotalAlumnos] = useState(n.total_alumnos ?? null);
  const [inscriptosCount, setInscriptosCount] = useState(n.inscriptos_count ?? null);
  const [cerrandoBusy, setCerrandoBusy] = useState(false);
  const [inscripcionCerradaAt, setInscripcionCerradaAt] = useState(n.inscripcion_cerrada_at || null);
  const [loading, setLoading] = useState(true);
  const { showAlert, showConfirm } = useDialog();

  const aliveRef = React.useRef(true);
  const fetchData = async () => {
    setLoading(true);
    try {
      const ofertasReq = sb.from("ofertas")
        .select("*, profiles!ofertas_pyme_id_fkey(nombre, email, pymes(nombre_comercial, descripcion, telefono, tier))")
        .eq("necesidad_id", n.id)
        .order("created_at", { ascending: true });

      const inscripcionesReq = sb.from("necesidad_inscripciones")
        .select("alumno_id, inscripto_por")
        .eq("necesidad_id", n.id);

      const progresoReq = sb.rpc("necesidad_progreso", { p_necesidad: n.id });

      // Refresh de la necesidad para detectar cambios de estado (adjudicada/cumplida)
      const necRefreshReq = sb.from("necesidades").select("estado, cumplida_at, cumplida_por, inscripcion_cerrada_at").eq("id", n.id).maybeSingle();
      necRefreshReq.then(({ data }) => {
        if (!aliveRef.current || !data) return;
        setN(prev => ({ ...prev, ...data }));
      });

      if (isPyme) {
        const [oRes, iRes, pRes] = await Promise.all([ofertasReq, inscripcionesReq, progresoReq]);
        if (!aliveRef.current) return;
        setOfertas(oRes.data || []);
        setInscripciones(iRes.data || []);
        const prog = (pRes.data || [])[0] || {};
        setInscripcionCerradaAt(prog.inscripcion_cerrada_at || null);
        setTotalAlumnos(prog.total_alumnos ?? null);
        setInscriptosCount(prog.inscriptos ?? null);
      } else {
        const miRolReq = sb.from("grupo_miembros")
          .select("rol_en_grupo")
          .eq("grupo_id", n.grupo_id)
          .eq("profile_id", profile.id)
          .maybeSingle();
        const [oRes, aRes, iRes, pRes, rRes] = await Promise.all([
          ofertasReq,
          sb.from("alumnos")
            .select("id, nombre, alumno_tutores!inner(profile_id)")
            .eq("grupo_id", n.grupo_id)
            .eq("alumno_tutores.profile_id", profile.id),
          inscripcionesReq,
          progresoReq,
          miRolReq,
        ]);
        if (!aliveRef.current) return;
        setOfertas(oRes.data || []);
        setInscripciones(iRes.data || []);
        const prog = (pRes.data || [])[0] || {};
        setInscripcionCerradaAt(prog.inscripcion_cerrada_at || null);
        setTotalAlumnos(prog.total_alumnos ?? null);
        setInscriptosCount(prog.inscriptos ?? null);
        setMiRol(rRes.data?.rol_en_grupo || null);
        const alumnos = aRes.data || [];
        setMisAlumnos(alumnos);

        if (alumnos.length > 0 && (oRes.data || []).length > 0) {
          const ofertaIds = (oRes.data || []).map(o => o.id);
          const alumnoIds = alumnos.map(a => a.id);
          const vRes = await sb.from("votos_oferta")
            .select("oferta_id, alumno_id")
            .in("oferta_id", ofertaIds)
            .in("alumno_id", alumnoIds)
            .eq("votante_id", profile.id);
          if (!aliveRef.current) return;
          const map = {};
          (vRes.data || []).forEach(v => { map[v.alumno_id] = v.oferta_id; });
          setMisVotos(map);
        }
      }
    } catch (e) {
      console.error("[Detalle] exception:", e);
    } finally {
      if (aliveRef.current) setLoading(false);
    }
  };
  useEffect(() => {
    aliveRef.current = true;
    fetchData();
    return () => { aliveRef.current = false; };
  }, [n.id]);

  const onVote = async (alumnoId, ofertaId) => {
    const { error } = await voteOferta(alumnoId, ofertaId);
    if (error) { await showAlert("Error al votar: " + error.message); return; }
    fetchData();
  };
  const onUnvote = async (alumnoId, ofertaId) => {
    const { error } = await unvoteOferta(alumnoId, ofertaId);
    if (error) { await showAlert("Error al revocar voto: " + error.message); return; }
    fetchData();
  };

  const esAdminGrupo = miRol === "creador" || miRol === "admin";
  const inscripcionCerrada = !!inscripcionCerradaAt;
  const handleCerrar = async () => {
    if (!await showConfirm("¿Cerrar inscripciones? Las pymes podrán ofertar con la cantidad final firme. Las familias ya no podrán sumarse.")) return;
    setCerrandoBusy(true);
    const { error } = await cerrarInscripcion(n.id);
    setCerrandoBusy(false);
    if (error) { await showAlert("Error: " + error.message); return; }
    fetchData();
  };
  const handleReabrir = async () => {
    if (!await showConfirm("¿Reabrir inscripciones?")) return;
    setCerrandoBusy(true);
    const { error } = await reabrirInscripcion(n.id);
    setCerrandoBusy(false);
    if (error) { await showAlert("Error: " + error.message); return; }
    fetchData();
  };

  return (
    <div className="anim-in">
      {/* Hero */}
      <div className="bg-[var(--ink)] text-white px-5 pt-5 pb-8">
        <button onClick={onBack} className="flex items-center gap-1 text-[var(--cream)]/80 text-sm font-semibold mb-4">
          <IconArrowLeft className="w-4 h-4" /> Atrás
        </button>
        <div className="flex items-center gap-2 flex-wrap mb-3">
          <div className={`inline-block px-3 py-1 rounded-full ${est.bg} ${est.fg} text-[10px] font-bold uppercase tracking-wider`}>
            {est.txt}
          </div>
          {!isPyme && n.grupo_nombre && (
            <div className="inline-block px-3 py-1 rounded-full bg-[var(--coral)] text-white text-[10px] font-bold uppercase tracking-wider">
              {n.grupo_nombre}
            </div>
          )}
        </div>
        <h1 className="font-display font-black text-3xl leading-tight">{n.titulo}</h1>
        <div className="mt-3 flex items-center gap-3 text-xs text-[var(--cream)]/70 flex-wrap">
          <span className="flex items-center gap-1"><IconMapPin className="w-3.5 h-3.5" /> {n.zona}</span>
          {n.rango && <span className="flex items-center gap-1"><IconUsers className="w-3.5 h-3.5" /> {n.rango}</span>}
        </div>
        <div className="mt-3 grid gap-1 text-xs text-[var(--cream)]/80">
          {n.fecha_limite_inscripcion && (
            <div className="flex items-center gap-1.5">
              <IconClock className="w-3.5 h-3.5 shrink-0" />
              <span>Inscripción hasta <span className="font-bold">{fmtFechaHora(n.fecha_limite_inscripcion)}</span></span>
            </div>
          )}
          {n.fecha_limite_entrega && (
            <div className="flex items-center gap-1.5">
              <IconClock className="w-3.5 h-3.5 shrink-0" />
              <span>Entrega hasta <span className="font-bold">{fmtFechaHora(n.fecha_limite_entrega)}</span></span>
            </div>
          )}
        </div>
      </div>

      <div className="px-5 -mt-5">
        <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] overflow-hidden" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
          {n.foto_url && (
            <img src={n.foto_url} alt="" className="w-full max-h-72 object-cover border-b-[1.5px] border-[var(--ink)]" />
          )}
          <div className="p-5">
            <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60">Descripción</h3>
            <p className="mt-2 text-sm text-[var(--ink)]/85 whitespace-pre-wrap">{n.descripcion}</p>

            {n.campos && Object.keys(n.campos).length > 0 && (
              <div className="mt-5">
                <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Detalle del pedido</h3>
                <div className="space-y-1.5 text-sm">
                  {Object.entries(n.campos).map(([k, v]) => (
                    <div key={k} className="flex items-baseline gap-2">
                      <span className="text-[var(--ink)]/55 capitalize">{k.replace(/_/g, " ")}:</span>
                      <span className="font-semibold">{String(v)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {n.link_referencia && (
              <div className="mt-5">
                <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Referencia</h3>
                <a href={n.link_referencia} target="_blank" rel="noopener noreferrer"
                   className="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl bg-[var(--mist)] border-[1.5px] border-[var(--ink)]/20 text-xs font-semibold text-[var(--ink)] hover:bg-[var(--sun)]/40 break-all">
                  🔗 Ver ejemplo / link
                </a>
              </div>
            )}

            <div className="mt-5 grid grid-cols-2 gap-3">
              <div>
                <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60">Presupuesto</h3>
                <p className="font-mono text-sm font-bold mt-1">{n.presupuesto_min || n.presupuesto_max ? fmtRange(n.presupuesto_min, n.presupuesto_max) : "—"}</p>
              </div>
              <div>
                <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60">Modalidad</h3>
                <p className="text-sm font-semibold mt-1 capitalize">
                  {n.modalidad === "individual"
                    ? `Individual · ${n.cantidad_por_alumno || 1}/alumno`
                    : "Grupal"}
                </p>
              </div>
            </div>

            {n.modalidad === "individual" && (
              <div className={`mt-3 p-3 rounded-xl border-[1.5px] ${
                inscripcionCerrada
                  ? "bg-[var(--sage)]/15 border-[var(--sage)]"
                  : "bg-[var(--violet)]/10 border-[var(--violet)]/30"
              }`}>
                <div className={`text-[10px] font-bold uppercase tracking-wider ${
                  inscripcionCerrada ? "text-[var(--sage)]" : "text-[var(--violet)]"
                }`}>
                  {inscripcionCerrada ? "Inscripciones cerradas" : "Inscripción abierta"}
                </div>
                <div className="text-sm font-bold mt-1">
                  {(() => {
                    const k = inscriptosCount ?? inscripciones.length;
                    return <>
                      {k}{totalAlumnos != null ? `/${totalAlumnos}` : ""} alumno{k === 1 ? "" : "s"} anotado{k === 1 ? "" : "s"}
                      {" · "}{inscripcionCerrada ? "cantidad final" : "total actual"}{": "}
                      <span className="font-mono">{k * Number(n.cantidad_por_alumno || 1)}</span>
                    </>;
                  })()}
                </div>
                {!isPyme && esAdminGrupo && (
                  <div className="mt-3 flex gap-2 flex-wrap">
                    {!inscripcionCerrada ? (
                      <button onClick={handleCerrar} disabled={cerrandoBusy}
                        className="px-3 py-1.5 rounded-lg bg-[var(--ink)] text-white text-[11px] font-bold uppercase tracking-wider disabled:opacity-50">
                        {cerrandoBusy ? "Cerrando..." : "Cerrar inscripciones"}
                      </button>
                    ) : (
                      <button onClick={handleReabrir} disabled={cerrandoBusy}
                        className="px-3 py-1.5 rounded-lg bg-white border-[1.5px] border-[var(--ink)]/40 text-[11px] font-bold uppercase tracking-wider text-[var(--ink)]/80 disabled:opacity-50">
                        {cerrandoBusy ? "..." : "Reabrir"}
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Inscripción para familia (modalidad individual) */}
      {!isPyme && n.modalidad === "individual" && misAlumnos.length > 0 && (
        <InscripcionPanel
          necesidad={n}
          misAlumnos={misAlumnos}
          inscripciones={inscripciones}
          inscripcionCerrada={inscripcionCerrada}
          onChanged={fetchData}
        />
      )}

      {/* Panel de cumplida: visible cuando adjudicada o cumplida */}
      {(n.estado === "adjudicada" || n.estado === "cumplida") && (
        <CumplidaPanel
          necesidad={n}
          profile={profile}
          ofertas={ofertas}
          esAdminGrupo={esAdminGrupo}
          onChanged={fetchData}
        />
      )}

      {/* Pagos externos + datos de contacto post-adjudicacion */}
      {(n.estado === "adjudicada" || n.estado === "cumplida") && (
        <PagosPanel
          necesidad={n}
          profile={profile}
          ofertas={ofertas}
          misAlumnos={misAlumnos}
          inscripciones={inscripciones}
          esAdminGrupo={esAdminGrupo}
        />
      )}

      {/* Sección rol */}
      {isPyme ? (
        <PymeOfertaPanel necesidad={n} profile={profile} ofertas={ofertas} loading={loading} onChanged={fetchData} />
      ) : (
        <FamiliaOfertasPanel
          necesidad={n}
          ofertas={ofertas}
          loading={loading}
          misAlumnos={misAlumnos}
          misVotos={misVotos}
          onVote={onVote}
          onUnvote={onUnvote}
          esAdminGrupo={esAdminGrupo}
          onChanged={fetchData}
        />
      )}

      <div className="h-8"></div>
    </div>
  );
}

/* ===================== Panel de cumplida (adjudicada/cumplida) ===================== */
function CumplidaPanel({ necesidad: n, profile, ofertas, esAdminGrupo, onChanged }) {
  const [busy, setBusy] = useState(false);
  const { showAlert, showConfirm } = useDialog();
  const ganadora = ofertas.find(o => o.estado === "ganadora");
  const soyPymeGanadora = ganadora && ganadora.pyme_id === profile.id;
  const puedeMarcar = n.estado === "adjudicada" && (esAdminGrupo || soyPymeGanadora);

  const cumplidaAt = n.cumplida_at ? new Date(n.cumplida_at) : null;
  const dentroDeVentana = cumplidaAt && (Date.now() - cumplidaAt.getTime() < 24 * 60 * 60 * 1000);

  const handleMarcar = async () => {
    if (!await showConfirm("¿Confirmás que la entrega ya se concretó? Vas a poder revertirlo durante 24hs.")) return;
    setBusy(true);
    const { error } = await marcarCumplida(n.id);
    setBusy(false);
    if (error) { await showAlert("Error: " + error.message); return; }
    onChanged();
  };
  const handleRevertir = async () => {
    if (!await showConfirm("¿Revertir la confirmación? La necesidad vuelve a 'adjudicada'.")) return;
    setBusy(true);
    const { error } = await revertirCumplida(n.id);
    setBusy(false);
    if (error) { await showAlert("Error: " + error.message); return; }
    onChanged();
  };

  return (
    <div className="px-5 mt-6">
      {n.estado === "cumplida" ? (
        <div className="bg-[var(--sage)]/10 rounded-3xl border-[1.5px] border-[var(--sage)] p-5">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--sage)] mb-1">✓ Cumplida</div>
          <div className="font-display font-bold text-lg">Entrega confirmada</div>
          {cumplidaAt && (
            <div className="text-xs text-[var(--ink)]/70 mt-1">
              {cumplidaAt.toLocaleString("es-AR", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" })}
            </div>
          )}
          {esAdminGrupo && dentroDeVentana && (
            <button onClick={handleRevertir} disabled={busy}
              className="mt-3 text-[11px] font-bold uppercase tracking-wider text-[var(--coral)] underline disabled:opacity-50">
              {busy ? "..." : "Revertir (24hs)"}
            </button>
          )}
        </div>
      ) : (
        <div className="bg-[var(--sun)]/30 rounded-3xl border-[1.5px] border-[var(--ink)] p-5">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)] mb-1">Adjudicada</div>
          <div className="font-display font-bold text-lg">¿Ya se concretó la entrega?</div>
          <p className="text-xs text-[var(--ink)]/70 mt-1">
            Cuando reciban el pedido, el admin del grupo o la pyme ganadora pueden marcarla como cumplida.
          </p>
          {puedeMarcar ? (
            <button onClick={handleMarcar} disabled={busy}
              className="btn-pop mt-3 w-full py-3 bg-[var(--ink)] text-[var(--sun)] font-extrabold rounded-xl uppercase tracking-wider text-xs disabled:opacity-50">
              {busy ? "..." : "Confirmar entrega →"}
            </button>
          ) : (
            <p className="mt-3 text-[11px] uppercase tracking-wider font-bold text-[var(--ink)]/50">
              Esperando confirmación del admin o la pyme
            </p>
          )}
        </div>
      )}
    </div>
  );
}

/* ===================== Panel de pagos externos + contacto ===================== */
function PagosPanel({ necesidad: n, profile, ofertas, misAlumnos, inscripciones, esAdminGrupo }) {
  const isPyme = profile.role === "pyme";
  const ganadora = ofertas.find(o => o.estado === "ganadora");
  const soyPymeGanadora = ganadora && ganadora.pyme_id === profile.id;
  const [pagos, setPagos] = useState([]);
  const [contactoPyme, setContactoPyme] = useState(null);
  const [contactoAdmins, setContactoAdmins] = useState([]);
  const [busyKey, setBusyKey] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const { showAlert, showConfirm } = useDialog();

  const aliveRef = React.useRef(true);
  const refresh = async () => {
    const reqs = [fetchPagos(n.id)];
    if (!isPyme) reqs.push(fetchContactoPyme(n.id));
    if (soyPymeGanadora) reqs.push(fetchContactoAdminGrupo(n.id));
    const results = await Promise.all(reqs);
    if (!aliveRef.current) return;
    setPagos(results[0]?.data || []);
    if (!isPyme) setContactoPyme((results[1]?.data || [])[0] || null);
    if (soyPymeGanadora) setContactoAdmins((results[isPyme ? 1 : 2]?.data) || []);
    setLoaded(true);
  };
  useEffect(() => {
    aliveRef.current = true;
    refresh();
    return () => { aliveRef.current = false; };
  }, [n.id]);

  const togglePago = async (alumnoId) => {
    const key = alumnoId || "self";
    const yaPago = pagos.some(p => alumnoId
      ? p.alumno_id === alumnoId
      : (p.profile_id === profile.id && p.alumno_id == null));
    if (!yaPago) {
      setBusyKey(key);
      const { error } = await registrarPago({ necesidadId: n.id, alumnoId });
      setBusyKey(null);
      if (error) { await showAlert("Error: " + error.message); return; }
    } else {
      if (!await showConfirm("¿Marcar como no pagado?")) return;
      setBusyKey(key);
      const { error } = await eliminarPago({ necesidadId: n.id, alumnoId });
      setBusyKey(null);
      if (error) { await showAlert("Error: " + error.message); return; }
    }
    refresh();
  };

  const copiar = async (txt, label) => {
    try { await navigator.clipboard.writeText(txt); await showAlert(`${label} copiado`); }
    catch { await showAlert("No se pudo copiar"); }
  };

  if (!loaded) return null;

  // Render contacto pyme (lo ven familias del grupo)
  const ContactoPyme = !isPyme && contactoPyme && (
    <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-3" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
      <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Cómo pagarle a la pyme</div>
      <div className="font-display font-bold text-base mb-2">{contactoPyme.nombre_comercial}</div>
      <div className="space-y-2 text-sm">
        {contactoPyme.alias_cbu && (
          <div className="flex items-center justify-between gap-2 p-2 rounded-lg bg-[var(--mist)]">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-[var(--ink)]/60 font-bold">Alias</div>
              <div className="font-mono font-semibold break-all">{contactoPyme.alias_cbu}</div>
            </div>
            <button onClick={() => copiar(contactoPyme.alias_cbu, "Alias")}
              className="shrink-0 px-2.5 py-1.5 rounded-lg bg-white border-[1.5px] border-[var(--ink)] text-[10px] font-bold uppercase tracking-wider">
              <IconCopy className="w-3.5 h-3.5" />
            </button>
          </div>
        )}
        {contactoPyme.cbu && (
          <div className="flex items-center justify-between gap-2 p-2 rounded-lg bg-[var(--mist)]">
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-wider text-[var(--ink)]/60 font-bold">CBU</div>
              <div className="font-mono font-semibold break-all">{contactoPyme.cbu}</div>
            </div>
            <button onClick={() => copiar(contactoPyme.cbu, "CBU")}
              className="shrink-0 px-2.5 py-1.5 rounded-lg bg-white border-[1.5px] border-[var(--ink)] text-[10px] font-bold uppercase tracking-wider">
              <IconCopy className="w-3.5 h-3.5" />
            </button>
          </div>
        )}
        {contactoPyme.telefono && (
          <a href={`https://wa.me/${contactoPyme.telefono.replace(/[^0-9]/g, "")}`} target="_blank" rel="noopener noreferrer"
             className="flex items-center justify-between gap-2 p-2 rounded-lg bg-[var(--sage)]/15 hover:bg-[var(--sage)]/25">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-[var(--ink)]/60 font-bold">WhatsApp</div>
              <div className="font-semibold">{contactoPyme.telefono}</div>
            </div>
            <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--sage)]">Abrir →</span>
          </a>
        )}
        {!contactoPyme.alias_cbu && !contactoPyme.cbu && (
          <p className="text-xs text-[var(--ink)]/60">La pyme aún no cargó datos de cobro. Coordinen por WhatsApp.</p>
        )}
      </div>
    </div>
  );

  // Render contacto admin (lo ve la pyme ganadora)
  const ContactoAdmins = soyPymeGanadora && contactoAdmins.length > 0 && (
    <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-3" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
      <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Contacto del grupo</div>
      <div className="space-y-2 text-sm">
        {contactoAdmins.map(a => (
          <div key={a.profile_id} className="p-2 rounded-lg bg-[var(--mist)]">
            <div className="font-bold">{a.nombre || "—"}</div>
            <div className="text-xs text-[var(--ink)]/70">{a.email}</div>
            {a.telefono && (
              <a href={`https://wa.me/${a.telefono.replace(/[^0-9]/g, "")}`} target="_blank" rel="noopener noreferrer"
                 className="inline-flex mt-1 items-center gap-1 text-xs font-bold text-[var(--sage)] uppercase tracking-wider">
                WhatsApp: {a.telefono} →
              </a>
            )}
          </div>
        ))}
      </div>
    </div>
  );

  // Tracking de pagos: solo familias del grupo lo accionan; pyme lo ve readonly
  let TrackingPagos = null;
  if (n.modalidad === "individual") {
    const inscriptosIds = new Set((inscripciones || []).map(i => i.alumno_id));
    const tutorAlumnos = (misAlumnos || []).filter(a => inscriptosIds.has(a.id));
    const totalInscriptos = inscripciones?.length || 0;
    const pagados = pagos.length;
    TrackingPagos = (
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
        <div className="flex items-baseline justify-between mb-2">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60">Pagos por alumno</div>
          <div className="text-xs font-bold font-mono">{pagados}/{totalInscriptos}</div>
        </div>
        {!isPyme && tutorAlumnos.length > 0 ? (
          <div className="space-y-2">
            {tutorAlumnos.map(a => {
              const pago = pagos.find(p => p.alumno_id === a.id);
              const yo = pago?.marcado_por === profile.id;
              const puedeAccionar = !pago || yo || esAdminGrupo;
              return (
                <div key={a.id} className="flex items-center justify-between gap-2 p-2.5 rounded-lg border-[1.5px] border-[var(--ink)]/15">
                  <div className="font-semibold text-sm">{a.nombre}</div>
                  <button onClick={() => togglePago(a.id)} disabled={busyKey === a.id || !puedeAccionar}
                    className={`px-3 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider border-[1.5px] disabled:opacity-50 ${
                      pago ? "bg-[var(--sage)] text-white border-[var(--sage)]" : "bg-white border-[var(--ink)]/40 text-[var(--ink)]"
                    }`}>
                    {busyKey === a.id ? "..." : (pago ? "✓ Pagado" : "Marcar pagado")}
                  </button>
                </div>
              );
            })}
          </div>
        ) : !isPyme ? (
          <p className="text-xs text-[var(--ink)]/60">No tenés alumnos inscriptos en esta necesidad.</p>
        ) : (
          <p className="text-xs text-[var(--ink)]/60">{pagados} de {totalInscriptos} familias ya marcaron el pago.</p>
        )}
      </div>
    );
  } else {
    // Grupal: 1 fila por familia (profile)
    const miPago = pagos.find(p => p.profile_id === profile.id && p.alumno_id == null);
    TrackingPagos = (
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
        <div className="flex items-baseline justify-between mb-2">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60">Pagos por familia</div>
          <div className="text-xs font-bold font-mono">{pagos.length} {pagos.length === 1 ? "pago" : "pagos"}</div>
        </div>
        {!isPyme ? (
          <button onClick={() => togglePago(null)} disabled={busyKey === "self"}
            className={`w-full py-3 rounded-xl text-xs font-extrabold uppercase tracking-wider border-[1.5px] disabled:opacity-50 ${
              miPago ? "bg-[var(--sage)] text-white border-[var(--sage)]" : "bg-white border-[var(--ink)] text-[var(--ink)]"
            }`}>
            {busyKey === "self" ? "..." : (miPago ? "✓ Marcaste tu pago — tocá para revertir" : "Marcar mi pago")}
          </button>
        ) : (
          <p className="text-xs text-[var(--ink)]/60">{pagos.length} familias ya marcaron su pago.</p>
        )}
      </div>
    );
  }

  return (
    <div className="px-5 mt-3">
      {ContactoPyme}
      {ContactoAdmins}
      {TrackingPagos}
    </div>
  );
}

/* ===================== Pyme: presentar oferta ===================== */
function PymeOfertaPanel({ necesidad: n, profile, ofertas, loading, onChanged }) {
  const miOferta = ofertas.find(o => o.pyme_id === profile.id);
  const [showForm, setShowForm] = useState(false);
  const [precio, setPrecio] = useState("");
  const [dias, setDias] = useState("");
  const [desc, setDesc] = useState("");
  const [enviando, setEnviando] = useState(false);
  const [err, setErr] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setEnviando(true); setErr(null);
    if (desc.trim().length < 10) { setErr("La descripción debe tener al menos 10 caracteres."); setEnviando(false); return; }
    const { error } = await crearOferta({
      necesidadId: n.id,
      precioCentavos: Number(precio),
      tiempoDias: dias ? Number(dias) : null,
      descripcion: desc.trim(),
    });
    setEnviando(false);
    if (error) { setErr(error.message); return; }
    setShowForm(false);
    setPrecio(""); setDias(""); setDesc("");
    onChanged();
  };

  if (loading) {
    return <div className="px-5 mt-6 text-sm text-[var(--ink)]/60">Cargando…</div>;
  }

  if (miOferta) {
    return (
      <div className="px-5 mt-6">
        <h2 className="font-display font-bold text-xl mb-3">Tu oferta</h2>
        <div className="bg-[var(--sage)]/10 rounded-3xl border-[1.5px] border-[var(--sage)] p-4">
          <div className="flex items-baseline justify-between gap-3 mb-2">
            <span className="font-mono font-extrabold text-2xl">{fmt(Number(miOferta.precio_total_centavos))}</span>
            {miOferta.tiempo_entrega_dias && (
              <span className="text-[10px] uppercase tracking-wider font-bold text-[var(--ink)]/60">{miOferta.tiempo_entrega_dias} días</span>
            )}
          </div>
          <p className="text-sm text-[var(--ink)]/85 whitespace-pre-wrap">{miOferta.descripcion}</p>
          <p className="text-[10px] uppercase tracking-wider font-bold text-[var(--sage)] mt-3">✓ Presentada</p>
        </div>
      </div>
    );
  }

  return (
    <div className="px-5 mt-6">
      <h2 className="font-display font-bold text-xl mb-3">¿Cubrís este pedido?</h2>
      <div className="bg-[var(--sun)] rounded-3xl border-[1.5px] border-[var(--ink)] p-5" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
        <p className="text-sm font-semibold">Las ofertas son <span className="hl-coral">selladas</span> — el grupo elige al cierre.</p>
        {!showForm ? (
          <button onClick={() => setShowForm(true)}
            className="btn-pop mt-4 w-full py-3.5 bg-[var(--ink)] text-[var(--sun)] font-extrabold rounded-xl border-[1.5px] border-[var(--ink)] uppercase tracking-wider text-sm">
            Presentar oferta →
          </button>
        ) : (
          <form onSubmit={submit} className="mt-4 space-y-3">
            {err && <div className="p-2 rounded-lg bg-rose-50 border border-rose-200 text-xs text-rose-700">{err}</div>}
            <Field label="Precio total ($)">
              <input type="number" min="1" required value={precio} onChange={(e) => setPrecio(e.target.value)} placeholder="45000"
                className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
            </Field>
            <Field label="Tiempo de entrega (días)">
              <input type="number" min="1" value={dias} onChange={(e) => setDias(e.target.value)} placeholder="7"
                className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
            </Field>
            <Field label="Detalle de la oferta">
              <textarea required minLength={10} maxLength={1000} rows={3} value={desc} onChange={(e) => setDesc(e.target.value)}
                placeholder="Material, calidad, condiciones, etc."
                className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none resize-none" />
            </Field>
            <div className="grid grid-cols-2 gap-2">
              <button type="button" onClick={() => setShowForm(false)}
                className="py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-xs font-bold uppercase tracking-wider">Cancelar</button>
              <button type="submit" disabled={enviando}
                className="btn-pop py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-[var(--ink)] text-[var(--sun)] text-xs font-bold uppercase tracking-wider disabled:opacity-50">
                {enviando ? "Enviando…" : "Enviar"}
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

/* ===================== Familia: lista de ofertas + voto ===================== */
function FamiliaOfertasPanel({ necesidad: n, ofertas, loading, misAlumnos, misVotos, onVote, onUnvote, esAdminGrupo, onChanged }) {
  if (loading) {
    return <div className="px-5 mt-6 text-sm text-[var(--ink)]/60">Cargando ofertas…</div>;
  }
  const adjudicada = n?.estado === "adjudicada" || ofertas.some(o => o.estado === "ganadora");
  return (
    <div className="px-5 mt-6">
      <h2 className="font-display font-bold text-xl mb-3">
        Ofertas recibidas <span className="text-[var(--ink)]/40">({ofertas.length})</span>
      </h2>
      {ofertas.length === 0 ? (
        <div className="bg-[var(--mist)] rounded-3xl p-5 text-center text-sm text-[var(--ink)]/70">
          Esperando ofertas. Te avisamos cuando lleguen.
        </div>
      ) : (
        <div className="space-y-3">
          {ofertas.map(o => (
            <OfertaCard key={o.id}
              o={o}
              necesidad={n}
              misAlumnos={misAlumnos}
              misVotos={misVotos}
              onVote={onVote}
              onUnvote={onUnvote}
              esAdminGrupo={esAdminGrupo}
              adjudicada={adjudicada}
              onChanged={onChanged}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function OfertaCard({ o, necesidad: n, misAlumnos, misVotos, onVote, onUnvote, esAdminGrupo, adjudicada, onChanged }) {
  const pyme = o.profiles?.pymes;
  const pymeNombre = pyme?.nombre_comercial
    || o.profiles?.nombre
    || (o.profiles?.email ? o.profiles.email.split("@")[0] : "Pyme");
  const monto = Number(o.precio_total_centavos);
  const dias = o.tiempo_entrega_dias;
  const esGanadora = o.estado === "ganadora";
  const esDescartada = o.estado === "descartada";
  const [adjudicandoBusy, setAdjudicandoBusy] = useState(false);
  const { showAlert, showConfirm } = useDialog();

  const onAdjudicar = async () => {
    if (!await showConfirm(`¿Adjudicar a "${pymeNombre}" por ${fmt(monto)}? Las demás ofertas quedan descartadas.`)) return;
    setAdjudicandoBusy(true);
    const { error } = await adjudicarOferta(o.id);
    setAdjudicandoBusy(false);
    if (error) { await showAlert("Error: " + error.message); return; }
    onChanged && onChanged();
  };

  return (
    <div className={`rounded-3xl border-[1.5px] p-4 transition ${
      esGanadora ? "bg-[var(--sage)]/15 border-[var(--sage)]"
      : esDescartada ? "bg-white border-[var(--ink)]/15 opacity-60"
      : "bg-white border-[var(--ink)]"
    }`} style={{boxShadow: esDescartada ? "none" : "3px 3px 0 var(--ink)"}}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-display font-bold text-lg">{pymeNombre}</h3>
            {esGanadora && (
              <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full bg-[var(--sage)] text-white">Ganadora</span>
            )}
            {esDescartada && (
              <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/55">Descartada</span>
            )}
          </div>
          {pyme?.descripcion && (
            <p className="text-[11px] text-[var(--ink)]/55 mt-0.5 line-clamp-1">{pyme.descripcion}</p>
          )}
        </div>
        <div className="text-right shrink-0">
          <div className="font-mono font-extrabold text-xl">{fmt(monto)}</div>
          {dias != null && <div className="text-[10px] uppercase tracking-wider text-[var(--ink)]/60">{dias} días</div>}
        </div>
      </div>
      <p className="text-sm text-[var(--ink)]/75 mt-3 whitespace-pre-wrap">{o.descripcion}</p>

      {esGanadora && pyme?.telefono && (
        <a href={`tel:${pyme.telefono}`} className="mt-3 inline-flex items-center gap-1.5 text-xs font-semibold text-[var(--sage)] underline">
          📞 {pyme.telefono}
        </a>
      )}

      {!adjudicada && misAlumnos && misAlumnos.length > 0 && (
        <div className="mt-3 pt-3 border-t border-[var(--ink)]/10">
          <div className="text-[10px] uppercase tracking-wider font-bold text-[var(--ink)]/55 mb-2">Tu voto</div>
          <div className="flex flex-wrap gap-2">
            {misAlumnos.map(a => {
              const voto = misVotos[a.id];
              const yaVotoEsta = voto === o.id;
              return (
                <button key={a.id} onClick={() => yaVotoEsta ? onUnvote(a.id, o.id) : onVote(a.id, o.id)}
                  className={`px-3 py-1.5 rounded-full border-[1.5px] text-xs font-bold ${yaVotoEsta ? 'bg-[var(--coral)] text-white border-[var(--ink)]' : 'bg-white text-[var(--ink)] border-[var(--ink)]/30'}`}>
                  {yaVotoEsta ? "✓ " : ""}{a.nombre}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {!adjudicada && esAdminGrupo && (
        <div className="mt-3 pt-3 border-t border-[var(--ink)]/10">
          <button onClick={onAdjudicar} disabled={adjudicandoBusy}
            className="w-full py-2.5 rounded-xl bg-[var(--ink)] text-[var(--sun)] text-xs font-bold uppercase tracking-wider disabled:opacity-50">
            {adjudicandoBusy ? "Adjudicando..." : "Adjudicar a esta pyme"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ===================== Familia: panel de inscripción (modalidad individual) ===================== */
function InscripcionPanel({ necesidad: n, misAlumnos, inscripciones, inscripcionCerrada, onChanged }) {
  const inscriptosSet = new Set(inscripciones.map(i => i.alumno_id));
  const [busy, setBusy] = useState(null);
  const { showAlert } = useDialog();

  const toggle = async (alumnoId, yaInscripto) => {
    if (inscripcionCerrada) return;
    setBusy(alumnoId);
    const { error } = yaInscripto
      ? await desinscribirAlumno(n.id, alumnoId)
      : await inscribirAlumno(n.id, alumnoId);
    setBusy(null);
    if (error) { await showAlert("Error: " + error.message); return; }
    onChanged();
  };

  return (
    <div className="px-5 mt-6">
      <h2 className="font-display font-bold text-xl mb-2">Anotar a tus hijos/as</h2>
      <p className="text-xs text-[var(--ink)]/65 mb-3">
        {inscripcionCerrada
          ? "Las inscripciones ya están cerradas. La cantidad final quedó firme para que las pymes oferten."
          : <>Cada alumno anotado suma <span className="font-bold">{n.cantidad_por_alumno}</span> unidad{n.cantidad_por_alumno === 1 ? "" : "es"} al total del pedido.</>}
      </p>
      <div className="space-y-2">
        {misAlumnos.map(a => {
          const yaInscripto = inscriptosSet.has(a.id);
          const isBusy = busy === a.id;
          const disabled = isBusy || inscripcionCerrada;
          return (
            <button key={a.id} onClick={() => toggle(a.id, yaInscripto)} disabled={disabled}
              className={`w-full flex items-center justify-between p-3 rounded-xl border-[1.5px] transition ${
                yaInscripto
                  ? "bg-[var(--sage)]/15 border-[var(--sage)]"
                  : "bg-white border-[var(--ink)]/30"
              } ${disabled ? "opacity-60 cursor-not-allowed" : ""}`}>
              <div className="flex items-center gap-2">
                <span className={`w-5 h-5 rounded-md border-[1.5px] flex items-center justify-center text-xs ${
                  yaInscripto ? "bg-[var(--sage)] border-[var(--sage)] text-white" : "border-[var(--ink)]/40 bg-white"
                }`}>
                  {yaInscripto ? "✓" : ""}
                </span>
                <span className="font-semibold text-sm">{a.nombre}</span>
              </div>
              <span className="text-[10px] uppercase tracking-wider font-bold text-[var(--ink)]/60">
                {isBusy ? "..." : inscripcionCerrada ? (yaInscripto ? "Anotado" : "—") : yaInscripto ? "Anotado" : "Anotar"}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== Publicar necesidad ===================== */
function PublicarScreen({ profile, grupoId, onChangeGrupo, onCancel, onPublicado }) {
  const [grupo, setGrupo] = useState(null);
  const [misGrupos, setMisGrupos] = useState([]);
  const [esAdmin, setEsAdmin] = useState(false);
  const [categorias, setCategorias] = useState([]);
  const [categoriaId, setCategoriaId] = useState("");
  const [titulo, setTitulo] = useState("");
  const [presupuestoMin, setPresupuestoMin] = useState("");
  const [presupuestoMax, setPresupuestoMax] = useState("");
  const [fechaInscripcion, setFechaInscripcion] = useState("");
  const [fechaEntrega, setFechaEntrega] = useState("");
  const [linkRef, setLinkRef] = useState("");
  const [modalidad, setModalidad] = useState("grupal"); // 'grupal' | 'individual'
  const [cantidadPorAlumno, setCantidadPorAlumno] = useState("");
  const [descripcion, setDescripcion] = useState("");
  const [campos, setCampos] = useState({});
  const [foto, setFoto] = useState(null); // File
  const [fotoPreview, setFotoPreview] = useState(null);
  const [enviando, setEnviando] = useState(false);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);

  // Cargar lista de mis grupos una vez (para el selector)
  useEffect(() => {
    (async () => {
      const { data } = await sb
        .from("grupo_miembros")
        .select("rol_en_grupo, grupos(id, nombre, zona, tipo, rango_familias)")
        .eq("profile_id", profile.id);
      const lista = (data || [])
        .map(r => ({ ...r.grupos, rol_en_grupo: r.rol_en_grupo }))
        .filter(g => g && g.id);
      setMisGrupos(lista);
    })();
  }, [profile.id]);

  // Cargar grupo activo + categorias + mi rol cada vez que cambia grupoId
  useEffect(() => {
    if (!grupoId) { setLoading(false); return; }
    let alive = true;
    setLoading(true);
    (async () => {
      try {
        const [gRes, cRes, mRes] = await Promise.all([
          sb.from("grupos").select("id, nombre, zona, rango_familias").eq("id", grupoId).maybeSingle(),
          sb.from("categorias").select("id, slug, nombre, campos_obligatorios").eq("activa", true).order("orden"),
          sb.from("grupo_miembros").select("rol_en_grupo").eq("grupo_id", grupoId).eq("profile_id", profile.id).maybeSingle(),
        ]);
        if (!alive) return;
        if (gRes.data) setGrupo(gRes.data);
        if (cRes.data) {
          setCategorias(cRes.data);
          if (cRes.data[0] && !categoriaId) setCategoriaId(cRes.data[0].id);
        }
        const rol = mRes.data?.rol_en_grupo;
        setEsAdmin(rol === "creador" || rol === "admin");
      } catch (e) {
        console.error("[Publicar] exception:", e);
      } finally {
        if (alive) setLoading(false);
      }
    })();
    return () => { alive = false; };
  }, [grupoId, profile.id]);

  // Reset campos cuando cambia categoría
  useEffect(() => { setCampos({}); }, [categoriaId]);

  const categoriaActual = categorias.find(c => c.id === categoriaId);
  const schemaCampos = categoriaActual?.campos_obligatorios || [];

  const setCampo = (key, value) => setCampos(prev => ({ ...prev, [key]: value }));

  const onPickFoto = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { setError("La foto no puede pesar más de 5 MB."); return; }
    if (!f.type.startsWith("image/")) { setError("Solo se aceptan imágenes."); return; }
    setError(null);
    setFoto(f);
    setFotoPreview(URL.createObjectURL(f));
  };

  const removeFoto = () => {
    setFoto(null);
    if (fotoPreview) URL.revokeObjectURL(fotoPreview);
    setFotoPreview(null);
  };

  const submit = async (e) => {
    e.preventDefault();
    setEnviando(true); setError(null);
    const tituloTrim = titulo.trim();
    if (tituloTrim.length < 8 || tituloTrim.length > 140) {
      setError("El título debe tener entre 8 y 140 caracteres."); setEnviando(false); return;
    }
    const descTrim = descripcion.trim();
    if (descTrim.length < 10 || descTrim.length > 1200) {
      setError("La descripción debe tener entre 10 y 1200 caracteres."); setEnviando(false); return;
    }
    // Validar campos requeridos del schema
    for (const c of schemaCampos) {
      if (c.required) {
        const v = campos[c.key];
        if (v == null || v === "") {
          setError(`Falta completar: ${c.label}`); setEnviando(false); return;
        }
        if (c.type === "int" && (Number.isNaN(Number(v)) || Number(v) < (c.min ?? 0))) {
          setError(`${c.label}: debe ser un número${c.min ? ` mayor o igual a ${c.min}` : ""}.`); setEnviando(false); return;
        }
      }
    }
    const min = presupuestoMin ? Number(presupuestoMin) : null;
    const max = presupuestoMax ? Number(presupuestoMax) : null;
    if (min != null && max != null && min > max) {
      setError("El mínimo no puede ser mayor que el máximo."); setEnviando(false); return;
    }
    // Validar link
    const linkTrim = (linkRef || "").trim();
    if (linkTrim && !/^https?:\/\//i.test(linkTrim)) {
      setError("El link debe empezar con http:// o https://."); setEnviando(false); return;
    }
    // Validar fechas
    const fIns = fechaInscripcion ? new Date(fechaInscripcion) : null;
    const fEnt = fechaEntrega ? new Date(fechaEntrega) : null;
    if (fIns && fEnt && fIns > fEnt) {
      setError("La fecha de inscripción no puede ser posterior a la de entrega."); setEnviando(false); return;
    }
    // Validar modalidad
    let cpa = null;
    if (modalidad === "individual") {
      if (!cantidadPorAlumno || Number(cantidadPorAlumno) < 1) {
        setError("Definí cuántas unidades suma cada alumno que se anote."); setEnviando(false); return;
      }
      cpa = Number(cantidadPorAlumno);
    }

    // 1. Subir foto a Storage si hay
    let fotoUrl = null;
    if (foto) {
      const ext = (foto.name.split(".").pop() || "jpg").toLowerCase();
      const path = `${grupoId}/${profile.id}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
      const { error: upErr } = await sb.storage.from("necesidad-fotos").upload(path, foto, { contentType: foto.type, upsert: false });
      if (upErr) { setError("Error subiendo foto: " + upErr.message); setEnviando(false); return; }
      const { data: pub } = sb.storage.from("necesidad-fotos").getPublicUrl(path);
      fotoUrl = pub?.publicUrl || null;
    }

    // 2. Insertar necesidad
    // Convertir int strings a números antes de guardar
    const camposClean = {};
    for (const c of schemaCampos) {
      const v = campos[c.key];
      if (v == null || v === "") continue;
      camposClean[c.key] = c.type === "int" ? Number(v) : v;
    }
    const { error: errInsert } = await sb.from("necesidades").insert({
      grupo_id: grupoId,
      creador_id: profile.id,
      creador_tipo: profile.role === "institucion" ? "institucion" : "familia",
      categoria_id: categoriaId,
      titulo: tituloTrim,
      descripcion: descTrim,
      zona: grupo.zona,
      presupuesto_min_centavos: min,
      presupuesto_max_centavos: max,
      fecha_limite_inscripcion: fIns ? fIns.toISOString() : null,
      fecha_limite_entrega: fEnt ? fEnt.toISOString() : null,
      link_referencia: linkTrim || null,
      modalidad,
      cantidad_por_alumno: cpa,
      campos: camposClean,
      foto_url: fotoUrl,
    });
    setEnviando(false);
    if (errInsert) { setError(errInsert.message); return; }
    onPublicado();
  };

  if (loading) {
    return <div className="p-8 text-sm text-[var(--ink)]/60">Cargando…</div>;
  }
  if (!grupo) {
    return (
      <div className="px-5 pt-8">
        <button onClick={onCancel} className="text-sm font-semibold text-[var(--ink)]/70 flex items-center gap-1 mb-4">
          <IconArrowLeft className="w-4 h-4" /> Volver
        </button>
        <h1 className="font-display font-black text-3xl">Sin grupo activo</h1>
        <p className="text-sm text-[var(--ink)]/70 mt-3">Necesitás estar en un grupo para publicar. Andá a "Grupo" y elegí o creá uno.</p>
      </div>
    );
  }
  if (!esAdmin) {
    return (
      <div className="px-5 pt-8">
        <button onClick={onCancel} className="text-sm font-semibold text-[var(--ink)]/70 flex items-center gap-1 mb-4">
          <IconArrowLeft className="w-4 h-4" /> Volver
        </button>
        <h1 className="font-display font-black text-3xl">Solo el creador o admin</h1>
        <p className="text-sm text-[var(--ink)]/70 mt-3">
          En <span className="font-bold">{grupo.nombre}</span> sólo el creador o un admin pueden publicar necesidades. Pedile al creador que te promueva.
        </p>
      </div>
    );
  }

  return (
    <div className="px-5 pt-6 pb-12 anim-in">
      <button onClick={onCancel} className="flex items-center gap-1 text-sm font-semibold text-[var(--ink)]/70 mb-4">
        <IconArrowLeft className="w-4 h-4" /> Cancelar
      </button>
      <h1 className="font-display font-black text-4xl leading-none">
        Publicar <span className="font-display-italic">necesidad</span>
      </h1>
      <p className="text-sm text-[var(--ink)]/60 mt-2">
        Las pymes lo verán anonimizado por zona.
      </p>
      <div className="squiggle my-5"></div>

      {/* Selector de grupo destino */}
      <div className="mb-4 rounded-2xl border-[1.5px] border-[var(--ink)] bg-[var(--sun)]/40 p-4">
        <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70 mb-2">
          Publicando para
        </div>
        {misGrupos.length > 1 ? (
          <select
            value={grupoId}
            onChange={(e) => onChangeGrupo && onChangeGrupo(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-semibold">
            {misGrupos.map(g => (
              <option key={g.id} value={g.id}>{g.nombre} · {g.zona}</option>
            ))}
          </select>
        ) : (
          <div>
            <div className="font-display font-bold text-lg leading-tight">{grupo.nombre}</div>
            <div className="text-xs text-[var(--ink)]/70">📍 {grupo.zona}</div>
          </div>
        )}
      </div>

      {error && (
        <div className="mb-4 p-3 rounded-xl bg-rose-50 border border-rose-200 text-xs text-rose-700">{error}</div>
      )}

      <form onSubmit={submit} className="space-y-4">
        <Field label="Título">
          <input value={titulo} onChange={(e) => setTitulo(e.target.value)} required minLength={8} maxLength={140} placeholder="ej: 25 mapas políticos plastificados"
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
        </Field>

        <Field label="Categoría">
          <select value={categoriaId} onChange={(e) => setCategoriaId(e.target.value)} required
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium">
            {categorias.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </Field>

        {/* Modalidad: grupal vs individual */}
        <div>
          <label className="block text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70 mb-2">¿Cómo se compra?</label>
          <div className="grid grid-cols-2 gap-2">
            <button type="button" onClick={() => setModalidad("grupal")}
              className={`text-left p-3 rounded-xl border-[1.5px] ${modalidad === "grupal" ? "border-[var(--ink)] bg-[var(--sun)]" : "border-[var(--ink)]/30 bg-white"}`}>
              <div className="text-sm font-bold">Grupal</div>
              <div className="text-[11px] text-[var(--ink)]/70 mt-0.5">Cantidad fija para todo el grupo (ej: 50 vasos).</div>
            </button>
            <button type="button" onClick={() => setModalidad("individual")}
              className={`text-left p-3 rounded-xl border-[1.5px] ${modalidad === "individual" ? "border-[var(--ink)] bg-[var(--sun)]" : "border-[var(--ink)]/30 bg-white"}`}>
              <div className="text-sm font-bold">Individual</div>
              <div className="text-[11px] text-[var(--ink)]/70 mt-0.5">Cada familia se anota — la cantidad sube con cada inscripto.</div>
            </button>
          </div>
        </div>

        {modalidad === "individual" && (
          <Field label="Cantidad por alumno *">
            <input type="number" min="1" required value={cantidadPorAlumno}
              onChange={(e) => setCantidadPorAlumno(e.target.value)} placeholder="2"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
            <p className="text-[10px] text-[var(--ink)]/55 mt-1">Cuántas unidades suma cada alumno que se anote (ej: 2 lápices por alumno).</p>
          </Field>
        )}

        {/* Campos dinámicos según categoría */}
        {schemaCampos.length > 0 && (
          <div className="rounded-2xl border-[1.5px] border-[var(--ink)]/20 bg-[var(--mist)] p-4 space-y-3">
            <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70">
              Detalle del pedido
            </div>
            {schemaCampos.map(c => (
              <Field key={c.key} label={c.label + (c.required ? " *" : "")}>
                {c.type === "int" && (
                  <input type="number" min={c.min ?? 0} value={campos[c.key] ?? ""}
                    onChange={(e) => setCampo(c.key, e.target.value)}
                    required={c.required} placeholder={c.placeholder || ""}
                    className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
                )}
                {c.type === "date" && (
                  <input type="date" value={campos[c.key] ?? ""}
                    onChange={(e) => setCampo(c.key, e.target.value)}
                    required={c.required}
                    className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium" />
                )}
                {c.type === "text" && (
                  <input type="text" value={campos[c.key] ?? ""}
                    onChange={(e) => setCampo(c.key, e.target.value)}
                    required={c.required} placeholder={c.placeholder || ""}
                    className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
                )}
                {c.help && <p className="text-[10px] text-[var(--ink)]/55 mt-1">{c.help}</p>}
              </Field>
            ))}
          </div>
        )}

        {/* Foto de referencia */}
        <Field label="Foto de referencia (opcional)">
          {fotoPreview ? (
            <div className="relative">
              <img src={fotoPreview} alt="preview" className="w-full max-h-60 object-cover rounded-xl border-[1.5px] border-[var(--ink)]" />
              <button type="button" onClick={removeFoto}
                className="absolute top-2 right-2 px-3 py-1 rounded-full bg-white border-[1.5px] border-[var(--ink)] text-[10px] font-bold uppercase tracking-wider">
                Quitar
              </button>
            </div>
          ) : (
            <label className="block w-full p-4 rounded-xl border-[1.5px] border-dashed border-[var(--ink)]/40 bg-white text-center cursor-pointer hover:bg-[var(--mist)]">
              <input type="file" accept="image/*" onChange={onPickFoto} className="hidden" />
              <span className="text-sm text-[var(--ink)]/70 font-semibold">📷 Subir foto</span>
              <p className="text-[10px] text-[var(--ink)]/50 mt-1">JPG/PNG · máx 5 MB</p>
            </label>
          )}
        </Field>

        <div className="grid grid-cols-2 gap-3">
          <Field label="Presupuesto mín ($)">
            <input type="number" min="0" value={presupuestoMin} onChange={(e) => setPresupuestoMin(e.target.value)} placeholder="30000"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
          </Field>
          <Field label="Presupuesto máx ($)">
            <input type="number" min="0" value={presupuestoMax} onChange={(e) => setPresupuestoMax(e.target.value)} placeholder="50000"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-mono" />
          </Field>
        </div>

        <Field label="Cierre de inscripción del grupo (opcional)">
          <input type="datetime-local" value={fechaInscripcion} onChange={(e) => setFechaInscripcion(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium" />
          <p className="text-[10px] text-[var(--ink)]/55 mt-1">Hasta cuándo las familias del grupo pueden anotarse / decidir.</p>
        </Field>

        <Field label="Fecha y hora de entrega (opcional)">
          <input type="datetime-local" value={fechaEntrega} onChange={(e) => setFechaEntrega(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium" />
          <p className="text-[10px] text-[var(--ink)]/55 mt-1">Cuándo se necesita en mano. Las pymes lo ven al ofertar.</p>
        </Field>

        <Field label="Link de referencia (opcional)">
          <input type="url" value={linkRef} onChange={(e) => setLinkRef(e.target.value)}
            placeholder="https://articulo.mercadolibre.com.ar/..."
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium" />
          <p className="text-[10px] text-[var(--ink)]/55 mt-1">Pegá un link de Mercado Libre, una foto online o referencia para que se entienda mejor.</p>
        </Field>

        <Field label="Descripción">
          <textarea value={descripcion} onChange={(e) => setDescripcion(e.target.value)} required minLength={10} maxLength={1200} rows={4}
            placeholder="Detalle del pedido. Sin nombres del jardín/colegio ni datos de contacto."
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none resize-none" />
        </Field>

        <div className="bg-[var(--mist)] rounded-2xl p-3 text-xs text-[var(--ink)]/75">
          <span className="font-bold">⚠️ Privacidad:</span> no incluyas teléfonos, emails ni nombre de la institución.
        </div>

        <button type="submit" disabled={enviando}
          className="btn-pop w-full py-3.5 bg-[var(--coral)] text-white font-extrabold rounded-xl border-[1.5px] border-[var(--ink)] uppercase tracking-wider text-sm disabled:opacity-50">
          {enviando ? "Publicando…" : "Publicar →"}
        </button>
      </form>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-1.5">{label}</span>
      {children}
    </label>
  );
}

/* ===================== CREAR GRUPO ===================== */
function CrearGrupoScreen({ profile, onCreated, onCancel }) {
  const [nombre, setNombre] = useState("");
  const [zona, setZona] = useState(ZONAS[0]);
  const [tipo, setTipo] = useState("aula");
  const [rango, setRango] = useState(RANGOS_FAMILIAS[0]);
  const [instNombre, setInstNombre] = useState("");
  const [instDireccion, setInstDireccion] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [grupoCreado, setGrupoCreado] = useState(null);

  const onSubmit = async (e) => {
    e.preventDefault();
    setSaving(true); setError(null);
    const { data, error } = await sb.rpc("crear_grupo", {
      p_nombre: nombre,
      p_zona: zona,
      p_tipo: tipo,
      p_rango: rango,
      p_inst_nombre: instNombre || null,
      p_inst_direccion: instDireccion || null
    });
    setSaving(false);
    if (error) { setError(error.message); return; }
    const grupo = Array.isArray(data) ? data[0] : data;
    if (!grupo) { setError("No se pudo crear el grupo (respuesta vacía)"); return; }
    setActiveGrupo(grupo.id);
    setGrupoCreado(grupo);
  };

  if (grupoCreado) {
    return (
      <AlumnoStepScreen
        grupoId={grupoCreado.id}
        grupoNombre={grupoCreado.nombre}
        contexto="creado"
        onDone={() => onCreated(grupoCreado)} />
    );
  }

  const tipos = [
    { v: "aula", label: "Aula / sala", desc: "Sala amarilla, 3°B…" },
    { v: "curso", label: "Curso completo", desc: "5° año entero" },
    { v: "comision", label: "Comisión", desc: "Evento, viaje, fiesta" }
  ];

  return (
    <div className="px-5 pt-8 anim-in pb-8">
      <button onClick={onCancel} className="text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-4 flex items-center gap-1">
        <IconArrowLeft className="w-3.5 h-3.5" /> Volver
      </button>
      <h1 className="font-display font-black text-4xl leading-none">Crear <span className="font-display-italic">grupo</span></h1>
      <p className="text-sm text-[var(--ink)]/70 mt-3 mb-5">
        Vas a quedar como <span className="font-bold">creador</span>. Después invitás a los demás con un link de WhatsApp.
      </p>

      <form onSubmit={onSubmit} className="space-y-4">
        <Field label="Nombre del grupo">
          <input value={nombre} onChange={(e) => setNombre(e.target.value)} required minLength={3} maxLength={60}
            placeholder="Sala Amarilla"
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
        </Field>

        <Field label="Tipo">
          <div className="grid grid-cols-3 gap-2">
            {tipos.map(t => (
              <button type="button" key={t.v} onClick={() => setTipo(t.v)}
                className={`p-3 rounded-xl border-[1.5px] text-left ${tipo === t.v ? "border-[var(--ink)] bg-[var(--sun)]" : "border-[var(--ink)]/30 bg-white"}`}>
                <div className="font-display font-bold text-sm">{t.label}</div>
                <div className="text-[10px] text-[var(--ink)]/60 mt-0.5">{t.desc}</div>

        <div className="rounded-2xl border-[1.5px] border-[var(--ink)]/20 bg-[var(--mist)] p-4 space-y-3">

/* ===================== ALUMNO STEP (post-crear/unirse) ===================== */
function AlumnoStepScreen({ grupoId, grupoNombre, contexto, onDone }) {
  // contexto: 'creado' | 'unido' — cambia el copy
  const [nombre, setNombre] = useState("");
  const [dni, setDni] = useState("");
  const [matches, setMatches] = useState(null);  // null = no buscado, [] = sin matches, [...] = matches
  const [matchSource, setMatchSource] = useState(null); // 'dni' | 'name'
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [misAlumnos, setMisAlumnos] = useState([]);

  const refreshMisAlumnos = async () => {
    const { data } = await sb.from("mis_alumnos").select("*").eq("grupo_id", grupoId);
    setMisAlumnos(data || []);
  };
  useEffect(() => { refreshMisAlumnos(); }, [grupoId]);

  const dniNorm = normalizarDni(dni);
  const dniValido = !dni || validarDni(dni);

  const onCheck = async (e) => {
    e.preventDefault();
    setLoading(true); setError(null);
    // 1. Primary: match por DNI (si lo cargo).
    if (dniNorm) {
      if (!validarDni(dniNorm)) { setLoading(false); setError("DNI inválido (deben ser 7 u 8 dígitos)."); return; }
      const { data, error: e1 } = await alumnoMatchByDni(grupoId, dniNorm);
      if (e1) { setLoading(false); setError(e1.message); return; }
      if (data && data.length > 0) {
        setLoading(false);
        setMatches(data);
        setMatchSource("dni");
        return;
      }
    }
    // 2. Fallback: match por nombre (red de seguridad para alumnos cargados sin DNI).
    const { data, error: e2 } = await alumnoMatchByName(grupoId, nombre);
    setLoading(false);
    if (e2) { setError(e2.message); return; }
    setMatches(data || []);
    setMatchSource((data || []).length > 0 ? "name" : null);
  };

  const onCreateNew = async () => {
    setLoading(true); setError(null);
    const { error } = await alumnoCreateWithTutor(grupoId, nombre, dniNorm || null);
    setLoading(false);
    if (error) { setError(error.message); return; }
    setNombre(""); setDni(""); setMatches(null); setMatchSource(null);
    refreshMisAlumnos();
  };

  const onJoinExisting = async (alumnoId) => {
    setLoading(true); setError(null);
    const { error } = await alumnoJoinAsTutor(alumnoId);
    setLoading(false);
    if (error) { setError(error.message); return; }
    setNombre(""); setDni(""); setMatches(null); setMatchSource(null);
    refreshMisAlumnos();
  };

  const headline = contexto === "creado"
    ? `Listo, creaste "${grupoNombre}"`
    : `Te sumaste a "${grupoNombre}"`;

  return (
    <div className="px-5 pt-8 anim-in pb-8">
      <h1 className="font-display font-black text-3xl leading-tight">{headline}</h1>
      <p className="text-sm text-[var(--ink)]/70 mt-3 mb-5">
        Ahora decinos quién es <span className="font-bold">tu hijo/a</span> en este grupo. Se usa para que tu voto cuente y para que sepan quién pagó.
      </p>

      {misAlumnos.length > 0 && (
        <div className="bg-[var(--sage)]/15 border-[1.5px] border-[var(--sage)] rounded-2xl p-3 mb-4">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--sage)] mb-1.5">Ya agregaste</div>
          <div className="flex flex-wrap gap-1.5">
            {misAlumnos.map(a => (
              <span key={a.alumno_id} className="text-xs font-bold bg-white px-2.5 py-1 rounded-full border-[1.5px] border-[var(--ink)]">
                {a.alumno_nombre}
              </span>
            ))}
          </div>
        </div>
      )}

      {!matches && (
        <form onSubmit={onCheck} className="space-y-3">
          <Field label="Nombre del hijo/a">
            <input value={nombre} onChange={(e) => setNombre(e.target.value)} required minLength={2} maxLength={60}
              placeholder="Joaquín"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
          </Field>
          <Field label="DNI">
            <input value={dni} onChange={(e) => setDni(e.target.value)} inputMode="numeric" maxLength={10}
              placeholder="45123456"
              className={`w-full px-4 py-3 rounded-xl border-[1.5px] bg-white text-[15px] font-medium focus:outline-none font-mono ${dni && !dniValido ? "border-rose-500" : "border-[var(--ink)]"}`} />
            <p className="text-[11px] text-[var(--ink)]/60 mt-1.5 leading-snug">
              🔒 Solo lo usamos para no duplicar al chico cuando otro tutor (papá/mamá/abuelos) lo carga después. <span className="font-bold">No se muestra a nadie</span>.
            </p>
          </Field>
          {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-2 text-center font-semibold">{error}</p>}
          <button type="submit" disabled={loading || nombre.length < 2 || (dni && !dniValido)}
            className="btn-pop w-full py-3 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs disabled:opacity-50">
            {loading ? "Buscando…" : "Continuar →"}
          </button>
        </form>
      )}

      {matches && matches.length === 0 && (
        <div className="space-y-3">
          <div className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-4">
            <p className="text-sm">Vamos a agregar a <span className="font-bold">{nombre}</span> al grupo.</p>
          </div>
          <button onClick={onCreateNew} disabled={loading}
            className="btn-pop w-full py-3 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
            {loading ? "Agregando…" : `Agregar ${nombre}`}
          </button>
          <button onClick={() => { setMatches(null); setMatchSource(null); setNombre(""); setDni(""); }} className="w-full py-2 text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60">
            Volver
          </button>
        </div>
      )}

      {matches && matches.length > 0 && (
        <div className="space-y-3">
          <div className={`rounded-2xl border-[1.5px] p-4 ${matchSource === "dni" ? "bg-[var(--sage)]/15 border-[var(--sage)]" : "bg-[var(--sun)]/30 border-[var(--ink)]"}`}>
            {matchSource === "dni" ? (
              <>
                <p className="text-sm font-bold">✓ Encontramos al chico en este grupo</p>
                <p className="text-xs text-[var(--ink)]/70 mt-1">El DNI coincide con un alumno ya cargado por otro tutor. Sumate como co-tutor — los dos van a poder votar y dividir el pago.</p>
              </>
            ) : (
              <>
                <p className="text-sm font-bold">Ya hay {matches.length === 1 ? "un/a" : matches.length} <span>{nombre}</span> en este grupo.</p>
                <p className="text-xs text-[var(--ink)]/70 mt-1">¿Es tu hijo/a? Sumate como co-tutor — los dos van a poder votar y dividir el pago.</p>
              </>
            )}
          </div>
          {matches.map(m => (
            <div key={m.alumno_id} className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-4 space-y-2">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-display font-bold text-lg">{m.nombre}</div>
                  <div className="text-[11px] text-[var(--ink)]/60">{m.tutores_count} tutor{m.tutores_count === 1 ? "" : "es"}: {(m.tutores_nombres || []).join(", ")}</div>
                </div>
              </div>
              {m.ya_soy_tutor ? (
                <div className="text-center text-[11px] font-bold uppercase tracking-wider text-[var(--sage)] py-2">
                  Ya sos tutor de este alumno
                </div>
              ) : (
                <button onClick={() => onJoinExisting(m.alumno_id)} disabled={loading}
                  className="btn-pop w-full py-2.5 bg-[var(--ink)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
                  Sí, es mi hijo/a — sumarme como tutor
                </button>
              )}
            </div>
          ))}
          {matchSource !== "dni" && (
            <button onClick={onCreateNew} disabled={loading}
              className="btn-pop w-full py-2.5 bg-white text-[var(--ink)] font-extrabold rounded-xl uppercase tracking-wider text-xs border-[1.5px] border-[var(--ink)]">
              No, es otro {nombre} → agregarlo aparte
            </button>
          )}
          <button onClick={() => { setMatches(null); setMatchSource(null); setNombre(""); setDni(""); }} className="w-full py-2 text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60">
            Volver
          </button>
        </div>
      )}

      <div className="mt-6 pt-5 border-t border-[var(--ink)]/10">
        <button onClick={onDone}
          className="btn-pop w-full py-3 bg-[var(--sage)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
          {misAlumnos.length === 0 ? "Saltar por ahora →" : "Listo, ir al grupo →"}
        </button>
        {misAlumnos.length > 0 && !matches && (
          <p className="text-[11px] text-center text-[var(--ink)]/60 mt-2">Tenés más hijos/as en este grupo? Escribí otro nombre arriba.</p>
        )}
      </div>
    </div>
  );
}

/* ===================== UNIRSE POR CÓDIGO MANUAL ===================== */
function UnirsePorCodigoScreen({ profile, onJoined, onCancel }) {
  const [code, setCode] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);
  const [unidoA, setUnidoA] = useState(null);  // {grupo_id, nombre} cuando ya nos unimos

  const onSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true); setError(null);
    const { data, error } = await joinGrupoByCode(code.trim());
    setSubmitting(false);
    if (error) { setError(error.message); return; }
    const result = Array.isArray(data) ? data[0] : data;
    if (result?.grupo_id) {
      setActiveGrupo(result.grupo_id);
      setUnidoA(result);
    }
  };

  if (unidoA) {
    return (
      <AlumnoStepScreen
        grupoId={unidoA.grupo_id}
        grupoNombre={unidoA.nombre}
        contexto="unido"
        onDone={() => onJoined(unidoA)} />
    );
  }

  return (
    <div className="px-5 pt-8 anim-in">
      <button onClick={onCancel} className="text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-4 flex items-center gap-1">
        <IconArrowLeft className="w-3.5 h-3.5" /> Volver
      </button>
      <h1 className="font-display font-black text-4xl leading-none">Pegá el <span className="font-display-italic">código</span></h1>
      <p className="text-sm text-[var(--ink)]/70 mt-3 mb-5">El que te compartió tu grupo te pasó un link o un código de 8 letras.</p>

      <form onSubmit={onSubmit} className="space-y-4">
        <input
          value={code} onChange={(e) => setCode(e.target.value.toUpperCase())}
          required maxLength={8} pattern="[A-Z0-9]{8}"
          placeholder="ABC123XY"
          className="w-full px-4 py-4 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-2xl font-mono font-bold tracking-[0.3em] text-center uppercase focus:outline-none" />
        {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-2 text-center font-semibold">{error}</p>}
        <button type="submit" disabled={submitting || code.length < 8}
          className="btn-pop w-full py-3.5 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-sm disabled:opacity-50">
          {submitting ? "Sumándote…" : "Sumarme →"}
        </button>
      </form>
    </div>
  );
}
