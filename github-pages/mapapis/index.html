/* ===================== URL + grupo helpers ===================== */
function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}
function buildInviteUrl(code) {
  const base = window.location.origin + window.location.pathname;
  return `${base}?join=${code}`;
}
function clearJoinFromUrl() {
  const url = new URL(window.location.href);
  url.searchParams.delete("join");
  window.history.replaceState({}, "", url.pathname + (url.search ? url.search : ""));
}
function setActiveGrupo(id) { try { localStorage.setItem("mapapis.activeGrupoId", id || ""); } catch {} }
function getActiveGrupo() { try { return localStorage.getItem("mapapis.activeGrupoId") || null; } catch { return null; } }
function setPendingJoinCode(code) { try { localStorage.setItem("mapapis.pendingJoinCode", code || ""); } catch {} }
function getPendingJoinCode() { try { return localStorage.getItem("mapapis.pendingJoinCode") || null; } catch { return null; } }
async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch { return false; }
}
async function joinGrupoByCode(code) {
  return await sb.rpc("join_grupo_by_code", { p_code: code });
}
async function alumnoMatchByName(grupo, nombre) {
  return await sb.rpc("alumno_match_by_name", { p_grupo: grupo, p_nombre: nombre });

/* ===================== AUTH GATE ===================== */
function AuthGate() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [joinBanner, setJoinBanner] = useState(null);  // { nombre, zona, code } cuando hay ?join=

  const refetchProfile = async (s) => {
    if (!s) return setProfile(null);
    const { data, error } = await sb.from("profiles").select("*").eq("id", s.user.id).single();
    if (error) {
      console.warn("profile fetch error:", error.message);
      setProfile({ id: s.user.id, email: s.user.email, role: null, _error: error.message });
    } else {
      setProfile(data);
    }
  };

  // Capturar ?join=CODE al cargar y guardar para después del login
  useEffect(() => {
    const code = getUrlParam("join");
    if (code) {
      setPendingJoinCode(code);
      // Buscar info del grupo para mostrar banner (acceso anon a la view)
      sb.from("grupos_por_invite").select("nombre, zona, miembros_count, invite_code")
        .eq("invite_code", code.toUpperCase()).maybeSingle()
        .then(({ data }) => { if (data) setJoinBanner(data); });
    }
  }, []);

  // Auto-join cuando ya hay sesión + rol familia/institucion + código pendiente
  useEffect(() => {
    const code = getPendingJoinCode();
    if (!code || !session || !profile?.role) return;
    if (profile.role === "pyme") {
      // pymes no pertenecen a grupos
      setPendingJoinCode("");
      return;
    }
    (async () => {
      const { data, error } = await joinGrupoByCode(code);
      if (error) {
        console.warn("join error:", error.message);
        alert("No pudimos sumarte al grupo: " + error.message);
        setPendingJoinCode("");
        return;
      }
      const result = Array.isArray(data) ? data[0] : data;
      if (result?.grupo_id) {
        setActiveGrupo(result.grupo_id);
        setPendingJoinCode("");
        clearJoinFromUrl();
        if (!result.ya_era_miembro) alert(`Te sumaste a "${result.nombre}" 🎉`);
      }
    })();
  }, [session, profile?.role]);

  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      setSession(data.session);
      await refetchProfile(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange(async (_e, s) => {
      setSession(s);
      await refetchProfile(s);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (loading) return <SplashScreen />;
  if (!session) return <LoginScreen joinBanner={joinBanner} />;
  if (!profile?.role) return <OnboardingRolScreen profile={profile} session={session} onDone={() => refetchProfile(session)} />;
  return <AppRoot session={session} profile={profile} onProfileChange={() => refetchProfile(session)} />;
}

/* ===================== LOGIN ===================== */
function LoginScreen({ joinBanner }) {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const onSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true); setError(null);
    // Preservar ?join= en el redirect
    const code = getPendingJoinCode();
    const redirect = window.location.origin + window.location.pathname + (code ? `?join=${code}` : "");
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: redirect }
    });
    setSubmitting(false);
    if (error) setError(error.message); else setSent(true);
  };

  const onGoogle = async () => {
    setError(null);
    const code = getPendingJoinCode();
    const redirect = window.location.origin + window.location.pathname + (code ? `?join=${code}` : "");
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: redirect }
    });
    if (error) setError(error.message);
  };

  return (
    <div className="min-h-screen flex flex-col bg-[var(--cream)] bg-dots">
      {/* Hero header */}
      <div className="px-6 pt-12 pb-6 anim-in">

          MaPaPis

        <p className="font-display-italic text-[28px] leading-tight mt-2 text-[var(--ink)]/80">
          Lo del cole, <span className="hl-sun">resuelto en grupo</span>.
        </p>
        <p className="mt-5 text-[15px] text-[var(--ink)]/70 max-w-sm">
          Publicá lo que el grupo necesita. <span className="font-semibold">Las pymes ofertan</span>, ustedes eligen, todos pagan menos.
        </p>
      </div>

      {/* Marquee de keywords */}
      <div className="overflow-hidden border-y-[1.5px] border-[var(--ink)] bg-[var(--ink)] py-2 my-2">
        <div className="marq-track flex gap-8 whitespace-nowrap text-[var(--cream)] font-display font-bold text-lg italic">

            "compras grupales", "uniformes", "salidas didácticas", "materiales", "eventos", "catering", "kits", "ofertas selladas"

          {/* Banner de invitación */}
          {joinBanner && (
            <div className="bg-[var(--sun)] rounded-2xl border-[1.5px] border-[var(--ink)] p-4" style={{boxShadow: "4px 4px 0 var(--ink)"}}>
              <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70">Invitación al grupo</div>
              <div className="font-display font-black text-xl mt-1">{joinBanner.nombre}</div>
              <div className="text-xs text-[var(--ink)]/70 mt-0.5">📍 {joinBanner.zona} · {joinBanner.miembros_count} miembro{joinBanner.miembros_count === 1 ? "" : "s"}</div>

                  Entrar con Google
                </button>

                <div className="flex items-center gap-2 my-4">
                  <div className="flex-1 h-px bg-[var(--ink)]/20"></div>
                  <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/50">o por email</span>
                  <div className="flex-1 h-px bg-[var(--ink)]/20"></div>

                <form onSubmit={onSubmit} className="space-y-3">
                  <input

/* ===================== ONBOARDING — elegir rol ===================== */
function OnboardingRolScreen({ profile, session, onDone }) {
  const [saving, setSaving] = useState(null);
  const [error, setError] = useState(null);

  const elegir = async (role) => {
    setSaving(role); setError(null);
    const { error } = await sb.from("profiles").update({ role }).eq("id", session.user.id);
    setSaving(null);
    if (error) setError(error.message);
    else onDone();
  };

  return (
    <div className="min-h-screen bg-[var(--cream)] bg-dots px-6 py-10 anim-in">
      <div className="max-w-md mx-auto">
        <button
          onClick={async () => { await sb.auth.signOut(); }}
          className="text-xs text-[var(--ink)]/60 hover:text-[var(--coral)] font-semibold mb-8 flex items-center gap-1"
        >
          <IconLogout className="w-3.5 h-3.5" /> Salir
        </button>
        <div className="text-xs font-bold uppercase tracking-[0.2em] text-[var(--coral)]">Bienvenido</div>
        <h1 className="font-display font-black text-5xl leading-none mt-3">
          ¿Quién <span className="font-display-italic">sos</span>?
        </h1>
        <p className="text-[var(--ink)]/70 mt-3 text-[15px]">
          Esto define qué pantallas vas a ver. Lo podés cambiar después.
        </p>
        <div className="mt-8 space-y-3">
          {Object.entries(ROLES_INFO).map(([key, info]) => {
            const IconCmp = info.icon;
            const isSaving = saving === key;
            return (
              <button
                key={key}
                disabled={!!saving}
                onClick={() => elegir(key)}
                className="card-hover w-full text-left bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 flex items-center gap-4 disabled:opacity-50"
                style={{boxShadow: "4px 4px 0 var(--ink)"}}
              >
                <div className="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0" style={{background: info.color}}>
                  <IconCmp className="w-7 h-7 text-white" />
                </div>
                <div className="flex-1">
                  <div className="font-display font-bold text-xl">{info.label}</div>
                  <div className="text-sm text-[var(--ink)]/60">{info.short}</div>
                </div>
                {isSaving ? <span className="text-xs">…</span> : <IconArrowRight className="w-5 h-5" />}
              </button>
            );
          })}
        </div>
        {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-3 text-center font-semibold mt-4">{error}</p>}
      </div>
    </div>
  );
}

/* ===================== APP ROOT — bottom nav + screens ===================== */
function AppRoot({ session, profile, onProfileChange }) {
  const [screen, setScreen] = useState("feed");
  const [selected, setSelected] = useState(null);
  const [activeGrupoId, setActiveGrupoIdState] = useState(getActiveGrupo() || null);

  const isPyme = profile.role === "pyme";

  // Primer login sin grupo y sin estar pendiente de un join → mandar al tab Grupo
  useEffect(() => {
    if (isPyme) return;
    (async () => {
      const { count } = await sb.from("grupo_miembros")
        .select("*", { count: "exact", head: true })
        .eq("profile_id", profile.id);
      if ((count || 0) === 0) setScreen("grupo");
    })();
    // eslint-disable-next-line
  }, []);

  const goDetalle = (n) => { setSelected(n); setScreen("detalle"); };
  const goBack = () => { setSelected(null); setScreen("feed"); };
  const onChangeGrupo = (id) => { setActiveGrupo(id || ""); setActiveGrupoIdState(id || null); };
  const goToScreen = (s) => {
    if (s === "grupo") {
      const stored = getActiveGrupo();
      if (stored && stored !== activeGrupoId) setActiveGrupoIdState(stored);
    }
    setScreen(s);
  };

  return (
    <div className="min-h-screen bg-[var(--cream)] flex justify-center">
      <div className="w-full max-w-md flex flex-col min-h-screen relative pb-24">
        {screen === "feed" && (isPyme
          ? <FeedPymeScreen profile={profile} onOpen={goDetalle} />
          : <FeedFamiliaScreen profile={profile} onOpen={goDetalle} />)}
        {screen === "publicar" && <PublicarScreen profile={profile} onCancel={goBack} onPublicado={goBack} />}
        {screen === "grupo" && <GrupoScreen profile={profile} grupoId={activeGrupoId} onChangeGrupo={onChangeGrupo} />}
        {screen === "detalle" && <DetalleScreen necesidad={selected} profile={profile} onBack={goBack} />}
        {screen === "perfil" && <PerfilScreen profile={profile} onProfileChange={onProfileChange} />}

        <BottomNav screen={screen} setScreen={goToScreen} isPyme={isPyme} />
      </div>
    </div>
  );
}

function BottomNav({ screen, setScreen, isPyme }) {
  return (
    <div className="fixed bottom-0 left-0 right-0 z-30 flex justify-center pointer-events-none">
      <div className="w-full max-w-md px-4 pb-3 pointer-events-auto">
        <div className="bg-[var(--ink)] text-white rounded-3xl px-3 py-2.5 flex items-center justify-around" style={{boxShadow: "4px 4px 0 var(--coral)"}}>
          <NavBtn IconCmp={IconHome} label="Feed" active={screen === "feed"} onClick={() => setScreen("feed")} />
          {!isPyme && <NavBtn IconCmp={IconUsers} label="Grupo" active={screen === "grupo"} onClick={() => { setScreen("grupo"); }} />}
          {!isPyme && (
            <button
              onClick={() => setScreen("publicar")}
              className="-mt-7 w-14 h-14 bg-[var(--coral)] rounded-2xl flex items-center justify-center border-[1.5px] border-[var(--ink)]"
              style={{boxShadow: "3px 3px 0 var(--ink)"}}
            >
              <IconPlus className="w-7 h-7 text-white" stroke={2.5} />

        </div>
      </div>
    </div>
  );
}

function CrearGrupoScreen({ profile, onCreated, onCancel }) {
  const [nombre, setNombre] = useState("");
  const [zona, setZona] = useState(ZONAS[0]);
  const [tipo, setTipo] = useState("aula");
  const [rango, setRango] = useState(RANGOS_FAMILIAS[0]);
  const [instNombre, setInstNombre] = useState("");
  const [instDireccion, setInstDireccion] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [grupoCreado, setGrupoCreado] = useState(null);

  const onSubmit = async (e) => {
    e.preventDefault();
    setSaving(true); setError(null);
    const { data, error } = await sb.rpc("crear_grupo", {
      p_nombre: nombre,
      p_zona: zona,
      p_tipo: tipo,
      p_rango: rango,
      p_inst_nombre: instNombre || null,
      p_inst_direccion: instDireccion || null
    });
    setSaving(false);
    if (error) { setError(error.message); return; }
    const grupo = Array.isArray(data) ? data[0] : data;
    if (!grupo) { setError("No se pudo crear el grupo (respuesta vacía)"); return; }
    setActiveGrupo(grupo.id);
    setGrupoCreado(grupo);
  };

  if (grupoCreado) {
    return (
      <AlumnoStepScreen
        grupoId={grupoCreado.id}
        grupoNombre={grupoCreado.nombre}

    { v: "aula", label: "Aula / sala", desc: "Sala amarilla, 3°B…" },
    { v: "curso", label: "Curso completo", desc: "5° año entero" },
    { v: "comision", label: "Comisión", desc: "Evento, viaje, fiesta" }

  return (
    <div className="px-5 pt-8 anim-in pb-8">

      </p>

      <form onSubmit={onSubmit} className="space-y-4">
        <Field label="Nombre del grupo">
          <input value={nombre} onChange={(e) => setNombre(e.target.value)} required minLength={3} maxLength={60}
            placeholder="Sala Amarilla"
            className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
        </Field>

        <Field label="Tipo">
          <div className="grid grid-cols-3 gap-2">
            {tipos.map(t => (
              <button type="button" key={t.v} onClick={() => setTipo(t.v)}
                className={`p-3 rounded-xl border-[1.5px] text-left ${tipo === t.v ? "border-[var(--ink)] bg-[var(--sun)]" : "border-[var(--ink)]/30 bg-white"}`}>

        <div className="rounded-2xl border-[1.5px] border-[var(--ink)]/20 bg-[var(--mist)] p-4 space-y-3">
          <div className="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/70">
            <IconBuilding className="w-3.5 h-3.5" /> Institución
          </div>

            <input value={instNombre} onChange={(e) => setInstNombre(e.target.value)} maxLength={120}

              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />

/* ===================== ALUMNO STEP (post-crear/unirse) ===================== */
function AlumnoStepScreen({ grupoId, grupoNombre, contexto, onDone }) {
  // contexto: 'creado' | 'unido' — cambia el copy
  const [nombre, setNombre] = useState("");
  const [matches, setMatches] = useState(null);  // null = no buscado, [] = sin matches, [...] = matches
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [misAlumnos, setMisAlumnos] = useState([]);

  const refreshMisAlumnos = async () => {
    const { data } = await sb.from("mis_alumnos").select("*").eq("grupo_id", grupoId);
    setMisAlumnos(data || []);
  };
  useEffect(() => { refreshMisAlumnos(); }, [grupoId]);

  const onCheckName = async (e) => {
    e.preventDefault();
    setLoading(true); setError(null);
    const { data, error } = await alumnoMatchByName(grupoId, nombre);
    setLoading(false);
    if (error) { setError(error.message); return; }
    setMatches(data || []);
  };

  const onCreateNew = async () => {
    setLoading(true); setError(null);
    const { error } = await alumnoCreateWithTutor(grupoId, nombre);
    setLoading(false);
    if (error) { setError(error.message); return; }
    setNombre(""); setMatches(null);
    refreshMisAlumnos();
  };

  const onJoinExisting = async (alumnoId) => {
    setLoading(true); setError(null);
    const { error } = await alumnoJoinAsTutor(alumnoId);
    setLoading(false);
    if (error) { setError(error.message); return; }
    setNombre(""); setMatches(null);
    refreshMisAlumnos();
  };

  const headline = contexto === "creado"
    ? `Listo, creaste "${grupoNombre}"`
    : `Te sumaste a "${grupoNombre}"`;

  return (
    <div className="px-5 pt-8 anim-in pb-8">
      <h1 className="font-display font-black text-3xl leading-tight">{headline}</h1>
      <p className="text-sm text-[var(--ink)]/70 mt-3 mb-5">
        Ahora decinos quién es <span className="font-bold">tu hijo/a</span> en este grupo. Se usa para que tu voto cuente y para que sepan quién pagó.
      </p>

      {misAlumnos.length > 0 && (
        <div className="bg-[var(--sage)]/15 border-[1.5px] border-[var(--sage)] rounded-2xl p-3 mb-4">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--sage)] mb-1.5">Ya agregaste</div>
          <div className="flex flex-wrap gap-1.5">
            {misAlumnos.map(a => (
              <span key={a.alumno_id} className="text-xs font-bold bg-white px-2.5 py-1 rounded-full border-[1.5px] border-[var(--ink)]">
                {a.alumno_nombre}
              </span>
            ))}
          </div>
        </div>
      )}

      {!matches && (
        <form onSubmit={onCheckName} className="space-y-3">
          <Field label="Nombre del hijo/a">
            <input value={nombre} onChange={(e) => setNombre(e.target.value)} required minLength={2} maxLength={60}
              placeholder="Joaquín"
              className="w-full px-4 py-3 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-[15px] font-medium focus:outline-none" />
          </Field>
          {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-2 text-center font-semibold">{error}</p>}
          <button type="submit" disabled={loading || nombre.length < 2}
            className="btn-pop w-full py-3 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs disabled:opacity-50">
            {loading ? "Buscando…" : "Continuar →"}
          </button>
        </form>
      )}

      {matches && matches.length === 0 && (
        <div className="space-y-3">
          <div className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-4">
            <p className="text-sm">Vamos a agregar a <span className="font-bold">{nombre}</span> al grupo.</p>
          </div>
          <button onClick={onCreateNew} disabled={loading}
            className="btn-pop w-full py-3 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
            {loading ? "Agregando…" : `Agregar ${nombre}`}
          </button>
          <button onClick={() => { setMatches(null); setNombre(""); }} className="w-full py-2 text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60">
            Cambiar nombre
          </button>
        </div>
      )}

      {matches && matches.length > 0 && (
        <div className="space-y-3">
          <div className="bg-[var(--sun)]/30 rounded-2xl border-[1.5px] border-[var(--ink)] p-4">
            <p className="text-sm font-bold">Ya hay {matches.length === 1 ? "un/a" : matches.length} <span>{nombre}</span> en este grupo.</p>
            <p className="text-xs text-[var(--ink)]/70 mt-1">¿Es tu hijo/a? Sumate como co-tutor — los dos van a poder votar y dividir el pago.</p>
          </div>
          {matches.map(m => (
            <div key={m.alumno_id} className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-4 space-y-2">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-display font-bold text-lg">{m.nombre}</div>
                  <div className="text-[11px] text-[var(--ink)]/60">{m.tutores_count} tutor{m.tutores_count === 1 ? "" : "es"}: {(m.tutores_nombres || []).join(", ")}</div>
                </div>
              </div>
              <button onClick={() => onJoinExisting(m.alumno_id)} disabled={loading}
                className="btn-pop w-full py-2.5 bg-[var(--ink)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
                Sí, es mi hijo/a — sumarme como tutor
              </button>
            </div>
          ))}
          <button onClick={onCreateNew} disabled={loading}
            className="btn-pop w-full py-2.5 bg-white text-[var(--ink)] font-extrabold rounded-xl uppercase tracking-wider text-xs border-[1.5px] border-[var(--ink)]">
            No, es otro {nombre} → agregarlo aparte
          </button>
          <button onClick={() => { setMatches(null); setNombre(""); }} className="w-full py-2 text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60">
            Cambiar nombre
          </button>
        </div>
      )}

      <div className="mt-6 pt-5 border-t border-[var(--ink)]/10">
        <button onClick={onDone}
          className="btn-pop w-full py-3 bg-[var(--sage)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
          {misAlumnos.length === 0 ? "Saltar por ahora →" : "Listo, ir al grupo →"}
        </button>
        {misAlumnos.length > 0 && !matches && (
          <p className="text-[11px] text-center text-[var(--ink)]/60 mt-2">Tenés más hijos/as en este grupo? Escribí otro nombre arriba.</p>
        )}
      </div>
    </div>
  );
}

/* ===================== UNIRSE POR CÓDIGO MANUAL ===================== */
function UnirsePorCodigoScreen({ profile, onJoined, onCancel }) {
  const [code, setCode] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);
  const [unidoA, setUnidoA] = useState(null);  // {grupo_id, nombre} cuando ya nos unimos

  const onSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true); setError(null);
    const { data, error } = await joinGrupoByCode(code.trim());
    setSubmitting(false);
    if (error) { setError(error.message); return; }
    const result = Array.isArray(data) ? data[0] : data;
    if (result?.grupo_id) {
      setActiveGrupo(result.grupo_id);
      setUnidoA(result);
    }
  };

  if (unidoA) {
    return (
      <AlumnoStepScreen
        grupoId={unidoA.grupo_id}
        grupoNombre={unidoA.nombre}
        contexto="unido"
        onDone={() => onJoined(unidoA)} />
    );
  }

  return (
    <div className="px-5 pt-8 anim-in">
      <button onClick={onCancel} className="text-xs font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-4 flex items-center gap-1">
        <IconArrowLeft className="w-3.5 h-3.5" /> Volver
      </button>
      <h1 className="font-display font-black text-4xl leading-none">Pegá el <span className="font-display-italic">código</span></h1>
      <p className="text-sm text-[var(--ink)]/70 mt-3 mb-5">El que te compartió tu grupo te pasó un link o un código de 8 letras.</p>

      <form onSubmit={onSubmit} className="space-y-4">
        <input
          value={code} onChange={(e) => setCode(e.target.value.toUpperCase())}
          required maxLength={8} pattern="[A-Z0-9]{8}"
          placeholder="ABC123XY"
          className="w-full px-4 py-4 rounded-xl border-[1.5px] border-[var(--ink)] bg-white text-2xl font-mono font-bold tracking-[0.3em] text-center uppercase focus:outline-none" />
        {error && <p className="text-xs text-rose-700 bg-rose-50 rounded-lg p-2 text-center font-semibold">{error}</p>}
        <button type="submit" disabled={submitting || code.length < 8}
          className="btn-pop w-full py-3.5 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-sm disabled:opacity-50">
          {submitting ? "Sumándote…" : "Sumarme →"}
        </button>
      </form>
    </div>
  );
}

  const fetchAll = async () => {
    setLoading(true);
    // Mis grupos (todos donde soy miembro)
    const { data: mgs } = await sb.from("grupo_miembros")
      .select("rol_en_grupo, grupos(id, nombre, zona, tipo, invite_code, creado_por, institucion_nombre, institucion_direccion)")
      .eq("profile_id", profile.id);
    const grupos = (mgs || []).map(m => ({ ...m.grupos, miRol: m.rol_en_grupo })).filter(Boolean);
    setMisGrupos(grupos);

    if (grupoId) {
      const g = grupos.find(x => x.id === grupoId);
      setGrupo(g || null);
      if (g) {
        const [{ data: mbs }, { data: als }] = await Promise.all([
          sb.from("grupo_miembros")
            .select("profile_id, rol_en_grupo, profiles(id, nombre, email)")
            .eq("grupo_id", grupoId),
          sb.from("alumnos")
            .select("id, nombre, alumno_tutores(profile_id, profiles(id, nombre, email))")
            .eq("grupo_id", grupoId)
            .order("nombre")
        ]);
        setMiembros(mbs || []);
        setAlumnos(als || []);
      }
    } else {
      setGrupo(null);
      setMiembros([]);
      setAlumnos([]);
    }
    setLoading(false);
  };

  useEffect(() => { fetchAll(); /* eslint-disable-next-line */ }, [grupoId]);

  const onCopyLink = async () => {
    if (!grupo) return;
    const ok = await copyToClipboard(buildInviteUrl(grupo.invite_code));
    if (ok) { setCopied(true); setTimeout(() => setCopied(false), 2000); }
  };

  const onShareWhatsApp = () => {
    if (!grupo) return;
    const url = buildInviteUrl(grupo.invite_code);
    const msg = `Te invito a sumarte a "${grupo.nombre}" en MaPaPis. Coordinamos compras del grupo: ${url}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
  };

  const onPromote = async (targetId) => {
    if (!confirm("¿Promover a admin? Va a poder gestionar el grupo y publicar necesidades.")) return;
    const { error } = await sb.rpc("promote_to_admin", { p_grupo: grupo.id, p_target: targetId });
    if (error) return alert(error.message);
    fetchAll();
  };

  const onDemote = async (targetId) => {
    const { error } = await sb.rpc("demote_admin", { p_grupo: grupo.id, p_target: targetId });
    if (error) return alert(error.message);
    fetchAll();
  };

  const onKick = async (targetId, nombre) => {
    if (!confirm(`¿Eliminar a ${nombre || "este miembro"} del grupo?`)) return;
    const { error } = await sb.rpc("kick_miembro", { p_grupo: grupo.id, p_target: targetId });
    if (error) return alert(error.message);
    fetchAll();
  };

  const onLeave = async () => {
    if (!confirm(`¿Salir de "${grupo.nombre}"?`)) return;
    const { error } = await sb.rpc("leave_grupo", { p_grupo: grupo.id });
    if (error) return alert(error.message);
    setActiveGrupo("");
    onChangeGrupo(null);
  };

  const onRegenerate = async () => {
    if (!confirm("¿Generar un código nuevo? El link anterior dejará de funcionar.")) return;
    const { data, error } = await sb.rpc("regenerate_invite_code", { p_grupo: grupo.id });
    if (error) return alert(error.message);
    fetchAll();
  };

  const onSwitch = (gid) => { setActiveGrupo(gid); onChangeGrupo(gid); };

  if (view === "crear") return <CrearGrupoScreen profile={profile} onCancel={() => setView("home")} onCreated={(g) => { onChangeGrupo(g.id); setView("home"); fetchAll(); }} />;
  if (view === "unirse") return <UnirsePorCodigoScreen profile={profile} onCancel={() => setView("home")} onJoined={(r) => { onChangeGrupo(r.grupo_id); setView("home"); fetchAll(); }} />;
  if (view === "agregar-alumno" && grupo) {
    return (
      <AlumnoStepScreen
        grupoId={grupo.id}
        grupoNombre={grupo.nombre}
        contexto="unido"
        onDone={() => { setView("home"); fetchAll(); }} />
    );
  }

  if (loading) {
    return <div className="px-5 pt-12 text-center text-sm text-[var(--ink)]/60">Cargando…</div>;
  }

  // Sin grupo activo y sin grupos: empty state
  if (!grupo && misGrupos.length === 0) {
    return (
      <div className="px-5 pt-8 anim-in">
        <h1 className="font-display font-black text-4xl leading-none">Tu <span className="font-display-italic">grupo</span></h1>
        <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-6 mt-6" style={{boxShadow: "4px 4px 0 var(--ink)"}}>
          <div className="text-5xl mb-3">👋</div>
          <h2 className="font-display font-bold text-2xl">Aún no estás en un grupo</h2>
          <p className="text-sm text-[var(--ink)]/70 mt-2">Creá uno para tu sala/aula, o sumate a uno existente con el código que te pasaron.</p>
          <div className="space-y-2 mt-5">
            <button onClick={() => setView("crear")}
              className="btn-pop w-full py-3 bg-[var(--coral)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">
              Crear grupo
            </button>
            <button onClick={() => setView("unirse")}
              className="btn-pop w-full py-3 bg-white text-[var(--ink)] font-extrabold rounded-xl uppercase tracking-wider text-xs">
              Tengo un código
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Tiene grupos pero ninguno seleccionado
  if (!grupo) {
    return (
      <div className="px-5 pt-8 anim-in">
        <h1 className="font-display font-black text-4xl leading-none">Mis <span className="font-display-italic">grupos</span></h1>
        <div className="space-y-2 mt-5">
          {misGrupos.map(g => (
            <button key={g.id} onClick={() => onSwitch(g.id)}
              className="w-full bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-4 text-left card-hover">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-display font-bold text-lg">{g.nombre}</div>
                  <div className="text-xs text-[var(--ink)]/60">📍 {g.zona} · {g.tipo}</div>
                </div>
                <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--coral)]">{g.miRol}</div>
              </div>
            </button>
          ))}
        </div>
        <div className="grid grid-cols-2 gap-2 mt-5">
          <button onClick={() => setView("crear")} className="btn-pop py-3 bg-[var(--ink)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs">+ Crear</button>
          <button onClick={() => setView("unirse")} className="btn-pop py-3 bg-white text-[var(--ink)] font-extrabold rounded-xl uppercase tracking-wider text-xs">Pegar código</button>
        </div>
      </div>
    );
  }

  const miMembership = miembros.find(m => m.profile_id === profile.id);
  const miRol = miMembership?.rol_en_grupo || "miembro";
  const soyAdmin = miRol === "creador" || miRol === "admin";
  const soyCreador = miRol === "creador";

  // ¿Tengo al menos un alumno en este grupo?
  const misAlumnos = alumnos.filter(a =>
    (a.alumno_tutores || []).some(t => t.profile_id === profile.id)
  );

  // Si soy familia/institución y todavía no agregué a ningún hijo en este grupo,
  // forzamos la pantalla de alumno antes que la home del grupo.
  if (misAlumnos.length === 0 && profile.role !== "pyme") {
    return (
      <AlumnoStepScreen
        grupoId={grupo.id}
        grupoNombre={grupo.nombre}
        contexto="unido"
        onDone={() => fetchAll()} />
    );
  }

  // Detectar duplicados (mismo lower(nombre)) — admin puede fusionar
  const dupGroups = (() => {
    const map = {};
    alumnos.forEach(a => {
      const key = (a.nombre || "").trim().toLowerCase();
      if (!key) return;
      (map[key] = map[key] || []).push(a);
    });
    return Object.values(map).filter(arr => arr.length > 1);
  })();

  const onMerge = async (keepId, mergeId, nombre) => {
    if (!confirm(`Fusionar ambos "${nombre}" en uno solo? Los tutores se combinan, no se pierde nada.`)) return;
    const { error } = await alumnosMerge(keepId, mergeId);
    if (error) return alert(error.message);
    fetchAll();
  };

  // Tutor admin actions usan el rol del profile en grupo_miembros
  const rolDe = (profileId) => miembros.find(m => m.profile_id === profileId)?.rol_en_grupo || "miembro";

  return (
    <div className="px-5 pt-8 anim-in">
      {/* Header */}
      <div className="flex items-start justify-between gap-2">
        <div>
          <h1 className="font-display font-black text-3xl leading-tight">{grupo.nombre}</h1>
          {grupo.institucion_nombre && (
            <div className="text-xs text-[var(--ink)]/70 mt-1 flex items-center gap-1">
              <IconBuilding className="w-3 h-3" /> {grupo.institucion_nombre}
            </div>
          )}
          <div className="text-xs text-[var(--ink)]/60 mt-0.5">📍 {grupo.zona} · {grupo.tipo} · {alumnos.length} chico{alumnos.length === 1 ? "" : "s"} · {miembros.length} familia{miembros.length === 1 ? "" : "s"}</div>
        </div>
        <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-full" style={{
          background: soyCreador ? "var(--sun)" : (soyAdmin ? "var(--violet)" : "var(--mist)"),
          color: soyAdmin && !soyCreador ? "white" : "var(--ink)"
        }}>
          {miRol}
        </span>
      </div>

      <div className="squiggle my-5"></div>

      {/* Invite link card */}
      <div className="bg-[var(--ink)] text-white rounded-3xl p-5" style={{boxShadow: "4px 4px 0 var(--coral)"}}>
        <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--sun)] mb-2 flex items-center gap-1.5">
          <IconLink className="w-3.5 h-3.5" /> Invitá al grupo
        </div>
        <div className="font-mono font-black text-2xl tracking-[0.2em]">{grupo.invite_code}</div>
        <div className="text-[11px] text-white/60 mt-1 break-all">{buildInviteUrl(grupo.invite_code)}</div>
        <div className="grid grid-cols-2 gap-2 mt-4">
          <button onClick={onCopyLink}
            className="py-2.5 bg-white text-[var(--ink)] font-extrabold rounded-xl uppercase tracking-wider text-xs flex items-center justify-center gap-1.5">
            <IconCopy className="w-3.5 h-3.5" /> {copied ? "Copiado!" : "Copiar"}
          </button>
          <button onClick={onShareWhatsApp}
            className="py-2.5 bg-[var(--sage)] text-white font-extrabold rounded-xl uppercase tracking-wider text-xs flex items-center justify-center gap-1.5">
            <IconShare className="w-3.5 h-3.5" /> WhatsApp
          </button>
        </div>
        {soyCreador && (
          <button onClick={onRegenerate} className="mt-3 text-[10px] font-bold uppercase tracking-wider text-[var(--sun)] flex items-center gap-1">
            <IconRefresh className="w-3 h-3" /> Regenerar código
          </button>
        )}
      </div>

      {/* Duplicados sugeridos para fusionar (solo admin) */}
      {soyAdmin && dupGroups.length > 0 && (
        <div className="mt-6 bg-[var(--sun)]/30 border-[1.5px] border-[var(--ink)] rounded-2xl p-4">
          <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)] mb-2 flex items-center gap-1">
            <IconSparkles className="w-3.5 h-3.5" /> Posibles duplicados
          </div>
          {dupGroups.map(grp => (
            <div key={grp[0].id} className="mt-2 text-sm">
              <div className="font-bold">{grp.length} alumnos llamados "{grp[0].nombre}"</div>
              <div className="text-[11px] text-[var(--ink)]/70">Si son la misma persona (típico: padres separados que cargaron por separado), fusionalos.</div>
              <button onClick={() => onMerge(grp[0].id, grp[1].id, grp[0].nombre)}
                className="mt-2 text-[11px] font-bold uppercase tracking-wider bg-[var(--ink)] text-white px-3 py-1.5 rounded-lg">
                Fusionar "{grp[0].nombre}" → 1 solo
              </button>
            </div>
          ))}
        </div>
      )}

      {/* Lista de alumnos */}
      <div className="flex items-center justify-between mt-6 mb-3">
        <h2 className="font-display font-bold text-xl">Chicos del grupo</h2>
        <button onClick={() => setView("agregar-alumno")}
          className="text-[10px] font-bold uppercase tracking-wider text-[var(--coral)] flex items-center gap-1">
          <IconPlus className="w-3 h-3" /> Agregar otro
        </button>
      </div>

      {alumnos.length === 0 ? (
        <div className="text-center text-sm text-[var(--ink)]/60 py-6 bg-white rounded-2xl border-[1.5px] border-[var(--ink)]/20">
          Todavía no hay chicos cargados.
        </div>
      ) : (
        <div className="space-y-2">
          {alumnos.map(a => {
            const tutores = a.alumno_tutores || [];
            const yoSoyTutor = tutores.some(t => t.profile_id === profile.id);
            const initial = (a.nombre || "?")[0]?.toUpperCase();
            return (
              <div key={a.id} className="bg-white rounded-2xl border-[1.5px] border-[var(--ink)] p-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-[var(--coral)]/15 flex items-center justify-center font-display font-black text-[var(--coral)]">{initial}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-bold text-base truncate">{a.nombre}</div>
                    <div className="text-[10px] text-[var(--ink)]/50 uppercase tracking-wider font-semibold">
                      {tutores.length} tutor{tutores.length === 1 ? "" : "es"}{yoSoyTutor ? " · sos uno" : ""}
                    </div>
                  </div>
                </div>

                {/* Tutores */}
                <div className="mt-2 pl-12 space-y-1.5">
                  {tutores.map(t => {
                    const tProfile = t.profiles;
                    const esYo = t.profile_id === profile.id;
                    const tRol = rolDe(t.profile_id);
                    const targetEsCreador = tRol === "creador";
                    const targetEsAdmin = tRol === "admin";
                    const puedoPromote = soyCreador && !esYo && !targetEsCreador && !targetEsAdmin;
                    const puedoDemote = soyCreador && !esYo && targetEsAdmin;
                    const puedoKick = soyAdmin && !esYo && !targetEsCreador && !(targetEsAdmin && !soyCreador);
                    return (
                      <div key={t.profile_id} className="flex items-center gap-2 text-xs">
                        <div className="w-6 h-6 rounded-full bg-[var(--mist)] flex items-center justify-center font-bold text-[10px]">
                          {(tProfile?.nombre || tProfile?.email || "?")[0]?.toUpperCase()}
                        </div>
                        <div className="flex-1 min-w-0 truncate">
                          <span className="font-semibold">{tProfile?.nombre || tProfile?.email?.split("@")[0]}</span>
                          {esYo && <span className="text-[9px] font-bold uppercase tracking-wider text-[var(--ink)]/50 ml-1">(yo)</span>}
                          {targetEsCreador && <IconCrown className="w-3 h-3 inline ml-1 text-[var(--sun)]" />}
                          {targetEsAdmin && !targetEsCreador && <span className="text-[9px] font-bold uppercase tracking-wider text-[var(--violet)] ml-1">admin</span>}
                        </div>
                        <div className="flex items-center gap-1">
                          {puedoPromote && (
                            <button onClick={() => onPromote(t.profile_id)} title="Promover a admin"
                              className="text-[9px] font-bold uppercase tracking-wider text-[var(--violet)] px-1.5 py-1 rounded-md bg-[var(--violet)]/10">+admin</button>
                          )}
                          {puedoDemote && (
                            <button onClick={() => onDemote(t.profile_id)} title="Quitar admin"
                              className="text-[9px] font-bold uppercase tracking-wider text-[var(--ink)]/60 px-1.5 py-1 rounded-md bg-[var(--mist)]">−admin</button>
                          )}
                          {puedoKick && (
                            <button onClick={() => onKick(t.profile_id, tProfile?.nombre)} title="Eliminar del grupo"
                              className="p-1 rounded-md text-rose-700 hover:bg-rose-50">
                              <IconTrash className="w-3.5 h-3.5" />
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Familias sin hijo cargado (admin las ve para invitarlas a completar) */}
      {soyAdmin && (() => {
        const profilesConHijo = new Set();
        alumnos.forEach(a => (a.alumno_tutores || []).forEach(t => profilesConHijo.add(t.profile_id)));
        const sinHijo = miembros.filter(m => !profilesConHijo.has(m.profile_id));
        if (sinHijo.length === 0) return null;
        return (
          <div className="mt-5">
            <h3 className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Familias sin hijo cargado</h3>
            <div className="space-y-1.5">
              {sinHijo.map(m => (
                <div key={m.profile_id} className="bg-[var(--mist)] rounded-xl p-2 text-xs flex items-center gap-2">
                  <div className="w-7 h-7 rounded-full bg-white flex items-center justify-center font-bold">
                    {(m.profiles?.nombre || m.profiles?.email || "?")[0]?.toUpperCase()}
                  </div>
                  <span className="flex-1">{m.profiles?.nombre || m.profiles?.email?.split("@")[0]}</span>
                  <span className="text-[10px] text-[var(--ink)]/50">aún no cargó</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Acciones bottom */}
      <div className="mt-6 space-y-2">
        {misGrupos.length > 1 && (
          <button onClick={() => onChangeGrupo(null)}
            className="w-full py-2.5 text-xs font-bold uppercase tracking-wider text-[var(--ink)]/70">
            Ver todos mis grupos
          </button>
        )}
        {!soyCreador && (
          <button onClick={onLeave}
            className="w-full py-2.5 text-xs font-bold uppercase tracking-wider text-rose-700">
            Salir del grupo
          </button>
        )}
      </div>

      <div className="h-12"></div>
    </div>
  );
}

/* ===================== Perfil ===================== */
function PerfilScreen({ profile, onProfileChange }) {
  const [editing, setEditing] = useState(false);
  const [nombre, setNombre] = useState(profile.nombre || "");
  const [saving, setSaving] = useState(false);

  const guardarNombre = async () => {
    setSaving(true);
    await sb.from("profiles").update({ nombre }).eq("id", profile.id);
    setSaving(false);
    setEditing(false);
    onProfileChange();
  };

  const cambiarRol = async () => {
    if (!confirm("¿Cambiar de rol? Vas a volver al onboarding.")) return;
    await sb.from("profiles").update({ role: null }).eq("id", profile.id);
    onProfileChange();
  };

  const logout = async () => { await sb.auth.signOut(); };

  const info = ROLES_INFO[profile.role];
  const IconCmp = info?.icon || IconUser;
  const initial = (profile.nombre || profile.email)[0]?.toUpperCase();

  return (
    <div className="px-5 pt-8 anim-in">
      <h1 className="font-display font-black text-4xl leading-none">Tu <span className="font-display-italic">perfil</span></h1>
      <div className="squiggle my-5"></div>

      {/* Header tarjeta */}
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-4" style={{boxShadow: "4px 4px 0 var(--ink)"}}>
        <div className="flex items-center gap-4">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center font-display font-black text-3xl text-white" style={{background: info?.color || "var(--coral)"}}>
            {initial}
          </div>
          <div className="flex-1 min-w-0">
            {editing ? (
              <div className="flex gap-2">
                <input value={nombre} onChange={(e) => setNombre(e.target.value)}
                  className="flex-1 px-3 py-2 rounded-lg border-[1.5px] border-[var(--ink)] text-sm font-semibold" />
                <button onClick={guardarNombre} disabled={saving} className="btn-pop bg-[var(--sage)] text-white px-3 py-2 rounded-lg border-[1.5px] border-[var(--ink)] text-xs font-bold uppercase">
                  {saving ? "…" : "OK"}
                </button>
              </div>
            ) : (
              <>
                <div className="font-display font-bold text-xl truncate">{profile.nombre || profile.email.split("@")[0]}</div>
                <div className="text-xs text-[var(--ink)]/60 truncate">{profile.email}</div>
                <button onClick={() => setEditing(true)} className="text-[10px] font-bold uppercase tracking-wider text-[var(--coral)] mt-1">Editar nombre</button>
              </>
            )}
          </div>
        </div>
      </div>

      {/* Rol */}
      <div className="bg-white rounded-3xl border-[1.5px] border-[var(--ink)] p-5 mb-4" style={{boxShadow: "3px 3px 0 var(--ink)"}}>
        <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--ink)]/60 mb-2">Rol</div>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background: info?.color}}>
              <IconCmp className="w-5 h-5 text-white" />
            </div>
            <div>
              <div className="font-display font-bold text-lg">{info?.label}</div>
              <div className="text-xs text-[var(--ink)]/60">{info?.short}</div>
            </div>
          </div>
        </div>
        <button onClick={cambiarRol} className="mt-4 text-xs font-bold uppercase tracking-wider text-[var(--coral)]">Cambiar de rol →</button>
      </div>

      {/* Logout */}
      <button onClick={logout} className="btn-pop w-full py-3.5 bg-white text-[var(--ink)] font-extrabold rounded-xl border-[1.5px] border-[var(--ink)] uppercase tracking-wider text-sm flex items-center justify-center gap-2">
        <IconLogout className="w-4 h-4" /> Cerrar sesión
      </button>

      <div className="text-center text-[10px] text-[var(--ink)]/40 mt-8 uppercase tracking-widest">
        MaPaPis · Prototipo v0.2
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
</body>
</html>
